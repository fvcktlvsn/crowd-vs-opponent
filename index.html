<html lang="en">
<head>
<meta charset="UTF-8">

<title>Crowd vs Opponent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060a10;display:flex;justify-content:center;padding:20px 12px;min-height:100vh;}

#bfire{color:#ef5350;border-color:#5a2020;}
</style>
</head>

<div id="wrap">

      x:Math.random()*W, y:Math.random()*H,
      sz:szR[0]+t*(szR[1]-szR[0]),

      ang:Math.PI/2

function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  Object.keys(SND_SRCS).forEach(function(name){
    fetch(SND_SRCS[name])
      .then(function(r){return r.arrayBuffer();})
      .then(function(ab){return actx.decodeAudioData(ab);})
      .then(function(buf){sndBufs[name]=buf;})
      .catch(function(e){console.warn('snd fail',name,e);});
  });
}
function resumeAudio(){if(!actx)initAudio();if(actx&&actx.state==='suspended')actx.resume();}
function onFirstGesture(){initAudio();if(actx&&actx.state==='suspended')actx.resume();}
document.addEventListener('touchstart',onFirstGesture,{once:true});
document.addEventListener('mousedown',onFirstGesture,{once:true});
document.addEventListener('keydown',onFirstGesture,{once:true});
function playBuf(name,vol,rate){
  try{if(!actx||!sndBufs[name])return;
  var src=actx.createBufferSource();src.buffer=sndBufs[name];
  if(rate)src.playbackRate.value=rate;
  var g=actx.createGain();g.gain.value=vol||1;
  src.connect(g);g.connect(actx.destination);src.start();}catch(e){}
}
// player shoot: pistol normally, rapid1 when rapid/auto powerup is active
function sndShoot(isRapid){if(isRapid){playBuf('rapid',0.65,1.0);}else{playBuf('pistol',0.85,1.0);}}
function sndShootEnemy(){playBuf('stormtrooper',0.6,1.0);}
function sndHit(){playBuf('hit',0.9,1.0);}
var PU_SNDs={rapid:'pu1',auto:'pu2',speed:'pu3',shield:'pu4',heal:'pu1'};function sndPow(type){playBuf(PU_SNDs[type]||'pu1',0.75,1.0);}
function sndWin(){try{if(!actx)return;var a=actx,t=a.currentTime;[440,554,659,880].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.2);o.connect(g);g.connect(a.destination);o.start(t+i*.08);o.stop(t+i*.08+.22);});}catch(e){}}
function sndLose(){try{if(!actx)return;var a=actx,t=a.currentTime;[330,220,165,110].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.25);o.connect(g);g.connect(a.destination);o.start(t+i*.1);o.stop(t+i*.1+.27);});}catch(e){}}

// Player — cartoony face on white circle
function drawCanadian(x,y,sz,expr){
  var r=sz*2.0;
  cx.save();cx.translate(x,y);
  cx.fillStyle='#ffffff';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  cx.fillStyle='#2a1a0a';
  cx.beginPath();cx.arc(0,-r*.18,r*.85,Math.PI+0.22,Math.PI*2-0.22,false);cx.closePath();cx.fill();
  var edx=E.x-x,edy=E.y-y,ed=Math.hypot(edx,edy)||1;
  var lx=edx/ed,ly=edy/ed;
  var eyY=-r*.08,eyX=r*.26,eyR=r*.13;
  var pupOx=lx*eyR*.3,pupOy=ly*eyR*.28;
  if(expr==='hit'){
    cx.strokeStyle='#111';cx.lineWidth=r*.07;cx.lineCap='round';
    [-eyX,eyX].forEach(function(ex){
      cx.beginPath();cx.moveTo(ex-eyR*.6,eyY-eyR*.6);cx.lineTo(ex+eyR*.6,eyY+eyR*.6);cx.stroke();
      cx.beginPath();cx.moveTo(ex+eyR*.6,eyY-eyR*.6);cx.lineTo(ex-eyR*.6,eyY+eyR*.6);cx.stroke();
    });
  } else if(expr==='panic'){
    [-eyX,eyX].forEach(function(ex){
      cx.fillStyle='#fff';cx.beginPath();cx.arc(ex,eyY,eyR*1.15,0,Math.PI*2);cx.fill();
      cx.strokeStyle='#333';cx.lineWidth=r*.024;cx.stroke();
      cx.fillStyle='#111';cx.beginPath();cx.arc(ex+pupOx*1.5,eyY+pupOy*1.5,eyR*.45,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(255,255,255,0.6)';cx.beginPath();cx.arc(ex+pupOx*1.5-eyR*.12,eyY+pupOy*1.5-eyR*.14,eyR*.15,0,Math.PI*2);cx.fill();
    });
  } else {
    [-eyX,eyX].forEach(function(ex){
      cx.fillStyle='#111';cx.beginPath();cx.arc(ex,eyY,eyR,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(255,255,255,0.55)';cx.beginPath();cx.arc(ex+pupOx-eyR*.2,eyY+pupOy-eyR*.22,eyR*.25,0,Math.PI*2);cx.fill();
    });
  }
  cx.strokeStyle='#2a1a0a';cx.lineWidth=r*.052;cx.lineCap='round';
  var bY=eyY-eyR-r*.09;
  if(expr==='panic'){
    cx.beginPath();cx.moveTo(-eyX-eyR*.8,bY+r*.05);cx.quadraticCurveTo(-eyX,bY-r*.1,-eyX+eyR*.8,bY+r*.05);cx.stroke();
    cx.beginPath();cx.moveTo(eyX-eyR*.8,bY+r*.05);cx.quadraticCurveTo(eyX,bY-r*.1,eyX+eyR*.8,bY+r*.05);cx.stroke();
  } else if(expr==='fire'){
    cx.beginPath();cx.moveTo(-eyX-eyR*.8,bY-r*.03);cx.lineTo(-eyX+eyR*.8,bY+r*.1);cx.stroke();
    cx.beginPath();cx.moveTo(eyX+eyR*.8,bY-r*.03);cx.lineTo(eyX-eyR*.8,bY+r*.1);cx.stroke();
  } else {
    [-eyX,eyX].forEach(function(ex){cx.beginPath();cx.moveTo(ex-eyR*.8,bY);cx.lineTo(ex+eyR*.8,bY);cx.stroke();});
  }
  var mY=r*.30;
  var jawOpen=expr==='fire'?Math.abs(Math.sin(jaw))*r*.52+r*.08:expr==='hit'?r*.40:expr==='panic'?Math.abs(Math.sin(jaw*1.7))*r*.26+r*.12:r*.02+Math.abs(Math.sin(jaw*.22))*r*.02;
  if(jawOpen>r*.05){
    cx.fillStyle='#1a0800';cx.beginPath();cx.rect(-r*.40,mY,r*.80,jawOpen+r*.02);cx.fill();
    cx.fillStyle='#fffce8';cx.fillRect(-r*.34,mY,r*.68,r*.10);
    cx.strokeStyle='rgba(200,185,155,.5)';cx.lineWidth=.8;
    for(var ti=-3;ti<=3;ti++){cx.beginPath();cx.moveTo(ti*r*.095,mY);cx.lineTo(ti*r*.095,mY+r*.10);cx.stroke();}
    cx.fillStyle='#f0d098';cx.beginPath();cx.rect(-r*.40,mY+jawOpen,r*.80,r*.24);cx.fill();
    cx.strokeStyle='#c09040';cx.lineWidth=r*.028;
    cx.beginPath();cx.moveTo(-r*.40,mY+jawOpen);cx.lineTo(r*.40,mY+jawOpen);cx.stroke();
    cx.beginPath();cx.moveTo(-r*.40,mY+jawOpen+r*.24);cx.lineTo(r*.40,mY+jawOpen+r*.24);cx.stroke();
  } else {
    cx.strokeStyle='rgba(0,0,0,.65)';cx.lineWidth=r*.055;cx.lineCap='butt';
    cx.beginPath();cx.moveTo(-r*.40,mY+r*.025);cx.lineTo(r*.40,mY+r*.025);cx.stroke();
  }
  if(expr==='hit'){cx.fillStyle='rgba(255,50,50,.18)';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();}
  cx.restore();
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.30)';cx.lineWidth=r*.038;cx.stroke();
}

// Opponent — photo on white circle, driven by tFace
function drawTrump(x,y,sz,expr){
  var r=sz*2.0;
  var imgKey=tFace;if(!TIMG[imgKey])imgKey='t_idle';
  cx.save();cx.translate(x,y);
  cx.fillStyle='#ffffff';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.clip();
  var img=TIMG[imgKey]||TIMG['t_idle'];
  if(img&&img.complete&&img.naturalWidth>0){
    var scale=Math.max(r*2.12/img.naturalWidth,r*2.12/img.naturalHeight);
    var dw=img.naturalWidth*scale,dh=img.naturalHeight*scale;
    cx.drawImage(img,-dw/2,-dh*0.44,dw,dh);
  }
  cx.restore();
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.28)';cx.lineWidth=r*.036;cx.stroke();
}

cv.addEventListener('keydown',function(e){resumeAudio();if(e.key===' '){e.preventDefault();if(!gameStarted){gameStarted=true;init();return;}spaceQ=true;spaceHeld=true;return;}var m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r'};if(m[e.key]){e.preventDefault();held[m[e.key]]=true;}});

function cXY(e){var r=cv.getBoundingClientRect(),scx=W/r.width,scy=H/r.height;return[(e.clientX-r.left)*scx,(e.clientY-r.top)*scy];}

  if(!gameStarted){gameStarted=true;init();return;}var p=cXY(e);if(Math.hypot(p[0]-P.x,p[1]-P.y)<P.sz*1.6+28){drag=true;dox=p[0]-P.x;doy=p[1]-P.y;}});

  if(!gameStarted){gameStarted=true;init();return;}var t=e.touches[0],p=cXY(t);

  if(!focused){cx.fillStyle='rgba(6,10,20,.6)';cx.fillRect(0,H-26,W,26);cx.fillStyle='rgba(79,195,247,.5)';cx.font='11px monospace';cx.textAlign='center';cx.fillText(isMobile?'tap to start \u2014 drag to move \u2014 auto-fires':'click here to enable keyboard controls',MX,H-9);}
  if(over){cx.fillStyle='rgba(4,8,16,.75)';cx.fillRect(0,0,W,H);cx.fillStyle=win==='crowd'?'#4fc3f7':'#ef5350';cx.font='bold 22px monospace';cx.textAlign='center';cx.fillText(win==='crowd'?'CROWD WINS!':'OPPONENT WINS!',MX,MY-16);cx.fillStyle='rgba(255,255,255,.5)';cx.font='12px monospace';cx.fillText('score  '+pScore+' \u2014 '+eScore,MX,MY+6);cx.fillStyle='rgba(255,255,255,.25)';cx.font='11px monospace';cx.fillText('next round starting\u2026  (round '+(round+1)+')',MX,MY+28);}
  if(paused&&!over){cx.fillStyle='rgba(4,8,16,.6)';cx.fillRect(0,0,W,H);cx.fillStyle='#4fc3f7';cx.font='bold 24px monospace';cx.textAlign='center';cx.fillText('PAUSED',MX,MY-8);cx.fillStyle='rgba(255,255,255,.35)';cx.font='11px monospace';cx.fillText(isMobile?'tap pause to resume':'press P or ESC to resume',MX,MY+14);}
  cx.setTransform(1,0,0,1,0,0);
  if(!gameStarted){
    cx.fillStyle='rgba(4,8,16,.84)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle='#4fc3f7';cx.font='bold 26px monospace';
    cx.fillText('CROWD  vs  OPPONENT',MX,MY-92);
    cx.strokeStyle='rgba(79,195,247,.35)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(MX-170,MY-72);cx.lineTo(MX+170,MY-72);cx.stroke();
    cx.fillStyle='rgba(255,255,255,.78)';cx.font='13px monospace';
    if(isMobile){
      cx.fillText('DRAG to move  ·  auto-fires while touching',MX,MY-50);
    } else {
      cx.fillText('←↑↓→  or  DRAG  to move',MX,MY-56);
      cx.fillText('SPACE  to fire  ·  hold = auto-fire',MX,MY-34);
    }
    cx.fillStyle='rgba(255,255,255,.52)';cx.font='12px monospace';
    cx.fillText('shoot the opponent • dodge red bolts • grab power-ups',MX,MY-10);
    cx.fillText('⚡ rapid  ·  ∞ auto  ·  » speed  ·  ◈ shield  ·  ♥ heal',MX,MY+14);
    var ctaLabel=isMobile?'►  TAP TO BEGIN':'►  CLICK TO BEGIN';
    var ctaW=cx.measureText(ctaLabel).width+48;
    var ctaX=MX-ctaW/2,ctaY=MY+44,ctaH=40;
    cx.fillStyle='#4fc3f7';
    cx.beginPath();cx.moveTo(ctaX+8,ctaY);cx.lineTo(ctaX+ctaW-8,ctaY);cx.arc(ctaX+ctaW-8,ctaY+8,8,-Math.PI/2,0);cx.lineTo(ctaX+ctaW,ctaY+ctaH-8);cx.arc(ctaX+ctaW-8,ctaY+ctaH-8,8,0,Math.PI/2);cx.lineTo(ctaX+8,ctaY+ctaH);cx.arc(ctaX+8,ctaY+ctaH-8,8,Math.PI/2,Math.PI);cx.lineTo(ctaX,ctaY+8);cx.arc(ctaX+8,ctaY+8,8,Math.PI,-Math.PI/2);cx.closePath();cx.fill();
    cx.fillStyle='#060a10';cx.font='bold 14px monospace';cx.fillText(ctaLabel,MX,MY+64);
    cx.textBaseline='alphabetic';
  }
}

function loop(ts){try{if(gameStarted)update(ts);draw(ts);}catch(err){console.error('loop error:',err);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
