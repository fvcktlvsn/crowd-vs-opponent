<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crowd vs Opponent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#020408;overflow-x:hidden;min-height:100vh;min-height:100dvh;}
body{display:flex;justify-content:center;padding:8px 6px;min-height:100vh;min-height:100dvh;}
#wrap{font-family:monospace;width:100%;max-width:1100px;color:#c0d0e8;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.hud{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;}
.hud b{font-weight:700;color:#e8f0ff;}
#msg{text-align:center;font-size:11px;opacity:.4;padding:4px 0;color:#6888aa;}
.btns{display:flex;gap:8px;justify-content:center;padding:8px 0 4px;flex-wrap:wrap;}
.btns button{padding:7px 18px;border:1px solid #2a3a55;border-radius:8px;background:#0d1828;font-family:monospace;font-size:13px;cursor:pointer;color:#8ab0d8;touch-action:manipulation;}
.btns button:active{background:#162840;}
#bfire{color:#ef5350;border-color:#5a2020;}
#g{display:block;cursor:crosshair;border-radius:8px;width:100%;height:auto;}
</style>
</head>
<body>
<div id="wrap">
  <div class="hud">
    <span>crowd hp: <b id="php">800</b></span>
    <span id="scoreboard" style="font-size:11px;opacity:.5">0 &#8212; 0</span><span id="bossbanner" style="font-size:11px;color:#ffaa00;font-weight:bold;display:none">&#9888; BOSS ROUND &#9888;</span>
    <span>opponent hp: <b id="ehp">800</b></span>
  </div>
  <canvas id="g"></canvas>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;">
    <div id="msg" style="flex:1;">click arena to start &middot; arrows move &middot; space fires</div>
    <button id="bpause" style="padding:4px 12px;border:1px solid #2a3a55;border-radius:6px;background:#0d1828;font-family:monospace;font-size:11px;cursor:pointer;color:#8ab0d8;touch-action:manipulation;">&#9646;&#9646; pause</button>
  </div>
  <div class="btns">
    <button id="bu">&uarr;</button><button id="bl">&larr;</button>
    <button id="bfire">&bull; fire</button>
    <button id="br">&rarr;</button><button id="bd">&darr;</button>
  </div>
  <div style="text-align:center;font-size:9px;opacity:.25;padding:6px 0;color:#6888aa;">v2.5.1</div>
</div>
<script src="assets.js"></script>
<script>
(function(){
var cv=document.getElementById('g'),cx=cv.getContext('2d');

// === RESPONSIVE SIZING ===
var isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
var W,H;
function sizeCanvas(){
  var wrap=document.getElementById('wrap');
  var maxW=wrap.clientWidth;
  // desktop: fill most of the viewport height; mobile: taller
  var viewH=window.innerHeight||document.documentElement.clientHeight;
  if(isMobile){
    // mobile: use most of viewport height minus HUD/buttons (~140px)
    var availH=viewH-160;
    W=maxW;
    H=Math.max(400,Math.min(availH,maxW*1.3));
  } else {
    // desktop: use ~80% of viewport height, cap width
    var availH2=viewH*0.78;
    W=Math.min(maxW,1100);
    H=Math.max(420,Math.min(availH2,W*0.7));
  }
  W=Math.round(W);H=Math.round(H);
  cv.width=W;cv.height=H;
  // update offscreen canvases
  [scvFar,scvMid,scvNear].forEach(function(c){if(c){c.width=W;c.height=H;}});
  MX=W/2;MY=H/2;
  // regenerate stars for new size
  regenerateStars();
}
var MX,MY;

if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arc(x+w-r,y+r,r,-Math.PI/2,0);this.lineTo(x+w,y+h-r);this.arc(x+w-r,y+h-r,r,0,Math.PI/2);this.lineTo(x+r,y+h);this.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);this.lineTo(x,y+r);this.arc(x+r,y+r,r,Math.PI,-Math.PI/2);this.closePath();return this;};}
var PAD=4;
var MAX_HP=800,MAX_SZ=20,MIN_SZ=12,FRICTION=.83,ACCEL=.48,DODGE_R=120;

// offscreen canvases for DOF blur
function mkLayer(){var c=document.createElement('canvas');c.width=W||800;c.height=H||500;return c;}
var scvFar=mkLayer(),scvMid=mkLayer(),scvNear=mkLayer();
var sxFar=scvFar.getContext('2d'),sxMid=scvMid.getContext('2d'),sxNear=scvNear.getContext('2d');

// starfield
var stars=[];
var STAR_CFG=[
  [0, 80,  [0.3,0.7],  [0.4,1.2],  [2,5],    [0.08,0.2]],
  [1, 55,  [0.6,1.2],  [1.5,3.5],  [6,14],   [0.2, 0.5]],
  [2, 30,  [1.0,2.2],  [4.0,9.0],  [16,34],  [0.5, 1.0]]
];
function regenerateStars(){
  stars=[];
  STAR_CFG.forEach(function(cfg){
    var layer=cfg[0],cnt=cfg[1],szR=cfg[2],spR=cfg[3],stR=cfg[4],brR=cfg[5];
    for(var si=0;si<cnt;si++){
      var t=Math.random();
      stars.push({layer:layer,x:Math.random()*W,y:Math.random()*H,sz:szR[0]+t*(szR[1]-szR[0]),sp:spR[0]+t*(spR[1]-spR[0]),streak:stR[0]+t*(stR[1]-stR[0]),br:brR[0]+t*(brR[1]-brR[0]),tw:Math.random()*Math.PI*2,ang:Math.PI/2});
    }
  });
}

function oval(ox,oy,rx,ry){var k=.552;cx.beginPath();cx.moveTo(ox,oy-ry);cx.bezierCurveTo(ox+rx*k,oy-ry,ox+rx,oy-ry*k,ox+rx,oy);cx.bezierCurveTo(ox+rx,oy+ry*k,ox+rx*k,oy+ry,ox,oy+ry);cx.bezierCurveTo(ox-rx*k,oy+ry,ox-rx,oy+ry*k,ox-rx,oy);cx.bezierCurveTo(ox-rx,oy-ry*k,ox-rx*k,oy-ry,ox,oy-ry);cx.closePath();}

// =====================================================
// ASSETS loaded from assets.js (SND_SRCS, TIMG_SRCS, PIMG_SRC)
// =====================================================
var actx=null;
var sndBufs={};
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  Object.keys(SND_SRCS).forEach(function(name){
    if(SND_SRCS[name]==='PUT_BASE64_HERE')return;
    fetch(SND_SRCS[name])
      .then(function(r){return r.arrayBuffer();})
      .then(function(ab){return actx.decodeAudioData(ab);})
      .then(function(buf){sndBufs[name]=buf;})
      .catch(function(e){console.warn('snd fail',name,e);});
  });
}
function resumeAudio(){if(!actx)initAudio();if(actx&&actx.state==='suspended')actx.resume();}
function onFirstGesture(){initAudio();if(actx&&actx.state==='suspended')actx.resume();}
document.addEventListener('touchstart',onFirstGesture,{once:true});
document.addEventListener('mousedown',onFirstGesture,{once:true});
document.addEventListener('keydown',onFirstGesture,{once:true});
function playBuf(name,vol,rate){
  try{if(!actx||!sndBufs[name])return;
  var src=actx.createBufferSource();src.buffer=sndBufs[name];
  if(rate)src.playbackRate.value=rate;
  var g=actx.createGain();g.gain.value=vol||1;
  src.connect(g);g.connect(actx.destination);src.start();}catch(e){}
}
function sndShoot(isRapid){if(isRapid){playBuf('rapid',0.65,1.0);}else{playBuf('pistol',0.85,1.0);}}
function sndShootEnemy(){playBuf('stormtrooper',0.6,1.0);}
function sndHit(){playBuf('hit',0.9,1.0);}
var PU_SNDs={rapid:'pu1',auto:'pu2',speed:'pu3',shield:'pu4',heal:'pu1'};function sndPow(type){playBuf(PU_SNDs[type]||'pu1',0.75,1.0);}
function sndWin(){try{if(!actx)return;var a=actx,t=a.currentTime;[440,554,659,880].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.2);o.connect(g);g.connect(a.destination);o.start(t+i*.08);o.stop(t+i*.08+.22);});}catch(e){}}
function sndLose(){try{if(!actx)return;var a=actx,t=a.currentTime;[330,220,165,110].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.25);o.connect(g);g.connect(a.destination);o.start(t+i*.1);o.stop(t+i*.1+.27);});}catch(e){}}

// Load opponent face images from TIMG_SRCS (defined in assets.js)
var TIMG={};
Object.keys(TIMG_SRCS).forEach(function(k){
  if(TIMG_SRCS[k]==='PUT_BASE64_HERE')return;
  var img=new Image();img.src=TIMG_SRCS[k];TIMG[k]=img;
});
var tFace='t_idle',tFaceTimer=0;
function setTFace(key,dur){tFace=key;tFaceTimer=dur;}

var cE='normal',cT=0,jaw=0;
function setC(e,d){cE=e;cT=d||90;}

// Player avatar image (loaded from PIMG_SRC in assets.js)
var PIMG=new Image();
if(typeof PIMG_SRC!=='undefined'&&PIMG_SRC!=='PUT_BASE64_HERE')PIMG.src=PIMG_SRC;

// Player draw — photo-based with animated expression overlays
function drawCanadian(x,y,sz,expr){
  var r=sz*2.0;
  cx.save();cx.translate(x,y);
  // white circle base
  cx.fillStyle='#ffffff';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  // clip to circle and draw photo — centered for square images
  cx.save();
  cx.beginPath();cx.arc(0,0,r*.98,0,Math.PI*2);cx.clip();
  if(PIMG&&PIMG.complete&&PIMG.naturalWidth>0){
    var dim=r*2.05;
    cx.drawImage(PIMG,0,0,PIMG.naturalWidth,PIMG.naturalHeight,-dim/2,-dim*0.46,dim,dim);
  } else {
    // fallback — orange pilot circle
    cx.fillStyle='#e89030';cx.beginPath();cx.arc(0,0,r*.7,0,Math.PI*2);cx.fill();
    cx.fillStyle='#fff';cx.font='bold '+(r*.6)+'px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('\u2726',0,0);
  }
  // expression overlays
  if(expr==='hit'){
    // red flash overlay
    cx.fillStyle='rgba(255,20,20,.32)';cx.fillRect(-r,-r,r*2,r*2);
    // X eyes over visor area
    var eyY=-r*.06,eyX=r*.18,eyR=r*.09;
    cx.strokeStyle='#ff1111';cx.lineWidth=r*.09;cx.lineCap='round';
    [-eyX,eyX].forEach(function(ex){
      cx.beginPath();cx.moveTo(ex-eyR,eyY-eyR);cx.lineTo(ex+eyR,eyY+eyR);cx.stroke();
      cx.beginPath();cx.moveTo(ex+eyR,eyY-eyR);cx.lineTo(ex-eyR,eyY+eyR);cx.stroke();
    });
  } else if(expr==='fire'){
    // angry orange glow at edges
    cx.fillStyle='rgba(255,120,0,.12)';cx.fillRect(-r,-r,r*2,r*2);
    // angry brow lines over visor
    var eyY2=-r*.06,eyX2=r*.18,eyR2=r*.12;
    cx.strokeStyle='rgba(255,80,0,.8)';cx.lineWidth=r*.07;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-eyX2-eyR2,eyY2-eyR2*1.6);cx.lineTo(-eyX2+eyR2,eyY2-eyR2*.8);cx.stroke();
    cx.beginPath();cx.moveTo(eyX2+eyR2,eyY2-eyR2*1.6);cx.lineTo(eyX2-eyR2,eyY2-eyR2*.8);cx.stroke();
  }
  cx.restore(); // unclip
  // circle outline
  cx.restore(); // untranslate
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.30)';cx.lineWidth=r*.038;cx.stroke();
}

// Opponent draw
function drawTrump(x,y,sz,expr){
  var r=sz*2.0;
  var imgKey=tFace;if(!TIMG[imgKey])imgKey='t_idle';
  cx.save();cx.translate(x,y);
  cx.fillStyle='#ffffff';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.clip();
  var img=TIMG[imgKey]||TIMG['t_idle'];
  if(img&&img.complete&&img.naturalWidth>0){
    var scale=Math.max(r*2.12/img.naturalWidth,r*2.12/img.naturalHeight);
    var dw=img.naturalWidth*scale,dh=img.naturalHeight*scale;
    cx.drawImage(img,-dw/2,-dh*0.44,dw,dh);
  } else {
    // fallback circle if images not loaded
    cx.fillStyle='#e8a040';cx.beginPath();cx.arc(0,0,r*.7,0,Math.PI*2);cx.fill();
    cx.fillStyle='#333';cx.font=(r*.5)+'px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('?',0,0);
  }
  cx.restore();
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.28)';cx.lineWidth=r*.036;cx.stroke();
}

// state
function mkE(px,py){return{x:px,y:py,vx:0,vy:0,ang:0,hp:MAX_HP,sz:MAX_SZ,ef:null,eft:0};}
var round=1,pScore=0,eScore=0,P,E,bullets,pups,pFire,eFire,puT,over,win,flashes,taunts,lastTaunt=0;
var gameStarted=false;
var isBoss=false;
var bossAnnounce=0; // countdown frames for boss announcement overlay
var combo=0,comboTimer=0,comboLabel="",comboLabelTimer=0;
var shake={life:0,amt:0};
var paused=false;
var TH=['WRONG!','SAD!','NOT FAIR!','FAKE NEWS!','RIGGED!','TOTAL DISASTER!','VERY BAD!','SO UNFAIR!','TREMENDOUS HIT!','YOU\'RE FIRED!','BELIEVE ME!','WINNING BIGLY!','NOT A SCRATCH!','PERFECT SHOT!','MANY PEOPLE SAY SO!','HUGE!','THE BEST HIT EVER!','DEAL WITH IT!'];
var TD=['YOU MISSED!','NOBODY DODGES BETTER!','TOO SLOW!','ZERO CHANCE!','TOO FAST FOR YOU!','BEAUTIFUL DODGE!','LIKE A ROCKET!','COVFEFE!','I KNOW DODGING!','THE ART OF THE DODGE!','FRANKLY PATHETIC!','MAYBE TRY HARDER?','LOW ENERGY SHOT!','AMATEUR HOUR!','I HAVE THE BEST REFLEXES!','SLEEPY SHOOTER!'];
var TL=['SEND HELP!','DEEP STATE!!','THIS IS RIGGED!','HOAX!','WITCH HUNT!','WHERE\'S MY WALL?!','NO COLLUSION!','VERY UNFAIR TREATMENT!','THEY\'RE AFTER ME!','SOMEBODY DO SOMETHING!','I DEMAND A RECOUNT!'];
var TW=['I WIN! I WIN!','TREMENDOUS VICTORY!','THE BEST WINNER!','NOBODY WINS BETTER!','TOTAL DOMINATION!','MADE WINNING GREAT AGAIN!','UNDER BUDGET, AHEAD OF SCHEDULE!','BIGGEST WIN IN HISTORY!','FRANKLY WE WON SO BIG!'];
var PUTYPES=[{id:'rapid',col:'#f57c00',glyph:'\u26A1'},{id:'auto',col:'#e91e63',glyph:'\u221E'},{id:'speed',col:'#388e3c',glyph:'\u00BB'},{id:'shield',col:'#7b1fa2',glyph:'\u25C8'},{id:'heal',col:'#c62828',glyph:'\u2665'}];
function init(){
  P=mkE(W*.2,MY);E=mkE(W*.8,MY);bullets=[];pups=[];flashes=[];taunts=[];combo=0;comboTimer=0;comboLabel="";comboLabelTimer=0;pFire=-9999;eFire=-9999;puT=[900,4200,7800,11500];over=false;win=null;tE='normal';cE='normal';
  isBoss=(round%3===0&&round>1);
  if(gameStarted&&isBoss){bossAnnounce=180;paused=true;} // 3 seconds announcement
  if(gameStarted)document.getElementById('bossbanner').style.display=isBoss&&!over?'inline':'none';
  document.getElementById('php').textContent=MAX_HP;document.getElementById('ehp').textContent=MAX_HP;
}

// Initial sizing
sizeCanvas();
init();
window.addEventListener('resize',function(){
  sizeCanvas();
  if(P){P.x=Math.min(P.x,W-PAD-P.sz*2);P.y=Math.min(P.y,H-PAD-P.sz*2);}
  if(E){E.x=Math.min(E.x,W-PAD-E.sz*2);E.y=Math.min(E.y,H-PAD-E.sz*2);}
});

function spawnPU(ts){if(pups.length>=4)return;var t=PUTYPES[Math.floor(Math.random()*PUTYPES.length)];pups.push({x:PAD+30+Math.random()*(W-PAD*2-60),y:PAD+30+Math.random()*(H-PAD*2-60),t:t,born:ts});}
function addTaunt(txt){taunts.push({txt:txt,life:130});}

// input
var held={},focused=false,spaceQ=false,spaceHeld=false,drag=false,dox=0,doy=0;
var touchActive=false;
cv.setAttribute('tabindex','0');
cv.style.touchAction='manipulation';
cv.addEventListener('focus',function(){focused=true;resumeAudio();cv.style.outline='2px solid #4fc3f7';document.getElementById('msg').textContent=isMobile?'drag to move \u00B7 auto-fires while touching':'arrows move \u00B7 space fires \u00B7 hold space = auto \u00B7 drag to reposition';});
cv.addEventListener('blur',function(){focused=false;cv.style.outline='none';Object.keys(held).forEach(function(k){delete held[k];});spaceHeld=false;touchActive=false;document.getElementById('msg').textContent=isMobile?'tap arena to play \u00B7 drag to move':'click arena to start \u00B7 arrows move \u00B7 space fires';});
cv.addEventListener('keydown',function(e){resumeAudio();if(e.key===' '){e.preventDefault();if(!gameStarted){gameStarted=true;init();return;}if(bossAnnounce>0){bossAnnounce=0;paused=false;return;}spaceQ=true;spaceHeld=true;return;}var m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r'};if(m[e.key]){e.preventDefault();held[m[e.key]]=true;}});
cv.addEventListener('keyup',function(e){if(e.key===' '){spaceHeld=false;return;}var m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r'};if(m[e.key])delete held[m[e.key]];});
function cXY(e){var r=cv.getBoundingClientRect(),scx=W/r.width,scy=H/r.height;return[(e.clientX-r.left)*scx,(e.clientY-r.top)*scy];}
cv.addEventListener('mousedown',function(e){cv.focus();resumeAudio();
  if(!gameStarted){gameStarted=true;init();return;}if(bossAnnounce>0){bossAnnounce=0;paused=false;return;}var p=cXY(e);if(Math.hypot(p[0]-P.x,p[1]-P.y)<P.sz*1.6+28){drag=true;dox=p[0]-P.x;doy=p[1]-P.y;}});
cv.addEventListener('mousemove',function(e){if(!drag||over)return;var p=cXY(e),nx=p[0]-dox,ny=p[1]-doy;P.vx=(nx-P.x)*.4;P.vy=(ny-P.y)*.4;P.ang=Math.atan2(ny-P.y,nx-P.x);P.x=nx;P.y=ny;wc(P);});
window.addEventListener('mouseup',function(){drag=false;});
cv.addEventListener('touchstart',function(e){e.preventDefault();cv.focus();resumeAudio();
  if(!gameStarted){gameStarted=true;init();return;}if(bossAnnounce>0){bossAnnounce=0;paused=false;return;}var t=e.touches[0],p=cXY(t);
  drag=true;touchActive=true;
  if(Math.hypot(p[0]-P.x,p[1]-P.y)<P.sz*1.6+60){dox=p[0]-P.x;doy=p[1]-P.y;}else{dox=0;doy=0;P.x=p[0];P.y=p[1];wc(P);}
},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();if(!drag||over)return;var t=e.touches[0],p=cXY(t),nx=p[0]-dox,ny=p[1]-doy;P.vx=(nx-P.x)*.4;P.vy=(ny-P.y)*.4;P.x=nx;P.y=ny;wc(P);},{passive:false});
cv.addEventListener('touchend',function(){drag=false;touchActive=false;});
cv.addEventListener('touchcancel',function(){drag=false;touchActive=false;});
function holdBtn(id,fn){var b=document.getElementById(id);if(!b)return;var iv=null;b.addEventListener('mousedown',function(e){e.preventDefault();resumeAudio();fn();iv=setInterval(fn,65);});b.addEventListener('touchstart',function(e){e.preventDefault();resumeAudio();fn();iv=setInterval(fn,65);},{passive:false});['mouseup','mouseleave','touchend','touchcancel'].forEach(function(ev){b.addEventListener(ev,function(){clearInterval(iv);});});}
holdBtn('bu',function(){mv(0,-1);});holdBtn('bd',function(){mv(0,1);});holdBtn('bl',function(){mv(-1,0);});holdBtn('br',function(){mv(1,0);});
document.getElementById('bfire').addEventListener('mousedown',function(){resumeAudio();spaceQ=true;spaceHeld=true;});
document.getElementById('bfire').addEventListener('touchstart',function(e){e.preventDefault();resumeAudio();spaceQ=true;spaceHeld=true;},{passive:false});
['mouseup','mouseleave','touchend','touchcancel'].forEach(function(ev){document.getElementById('bfire').addEventListener(ev,function(){spaceHeld=false;});});
var bpause=document.getElementById('bpause');
function togglePause(){if(bossAnnounce>0)return;paused=!paused;bpause.textContent=paused?'\u25B6 resume':'\u23F8 pause';}
bpause.addEventListener('mousedown',function(e){e.preventDefault();togglePause();});
bpause.addEventListener('touchstart',function(e){e.preventDefault();togglePause();},{passive:false});
document.addEventListener('keydown',function(e){if(e.key==='Escape'||e.key==='p'){togglePause();}});
if(isMobile){document.querySelector('.btns').style.display='none';document.getElementById('msg').textContent='tap arena to play \u00B7 drag to move';}

// physics
function wc(e){
  var m=e.sz*1.6+PAD;
  if(e.x<m){e.x=m;if(e.vx<0)e.vx*=-.6;}
  if(e.x>W-m){e.x=W-m;if(e.vx>0)e.vx*=-.6;}
  if(e.y<m){e.y=m;if(e.vy<0)e.vy*=-.6;}
  if(e.y>H-m){e.y=H-m;if(e.vy>0)e.vy*=-.6;}
}

    cx.fillStyle='rgba(255,255,255,.5)';cx.font=(endFs*.6)+'px monospace';
    cx.fillText('score  '+pScore+' \u2014 '+eScore,MX,MY);
    cx.fillStyle='rgba(255,255,255,.25)';cx.font=(endFs*.45)+'px monospace';
    cx.fillText('next round starting\u2026  (round '+(round+1)+')',MX,MY+endFs*.9);
    // taunts hidden on game over — solid bg covers them
  }

  if(paused&&!over&&bossAnnounce<=0){cx.fillStyle='rgba(4,8,16,.6)';cx.fillRect(0,0,W,H);cx.fillStyle='#4fc3f7';cx.font='bold 24px monospace';cx.textAlign='center';cx.fillText('PAUSED',MX,MY-8);cx.fillStyle='rgba(255,255,255,.35)';cx.font='11px monospace';cx.fillText(isMobile?'tap pause to resume':'press P or ESC to resume',MX,MY+14);}
  cx.setTransform(1,0,0,1,0,0);

  // === START SCREEN — solid black bg ===
  if(!gameStarted){
    cx.fillStyle='#020408';cx.fillRect(0,0,W,H);
    // subtle star twinkle on start screen
    drawStars(ts);
    cx.save();cx.filter='blur(3px)';cx.globalAlpha=.3;cx.drawImage(scvFar,0,0);cx.filter='none';cx.globalAlpha=.5;cx.drawImage(scvNear,0,0);cx.globalAlpha=1;cx.restore();
    cx.textAlign='center';cx.textBaseline='middle';
    var tFs=Math.min(30,W*.04);
    cx.fillStyle='#4fc3f7';cx.font='bold '+tFs+'px monospace';
    cx.fillText('CROWD  vs  OPPONENT',MX,MY-tFs*3.5);
    cx.strokeStyle='rgba(79,195,247,.35)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(MX-170,MY-tFs*2.6);cx.lineTo(MX+170,MY-tFs*2.6);cx.stroke();
    cx.fillStyle='rgba(255,255,255,.78)';cx.font=(tFs*.5)+'px monospace';
    if(isMobile){
      cx.fillText('DRAG to move  \u00B7  auto-fires while touching',MX,MY-tFs*1.5);
    } else {
      cx.fillText('\u2190\u2191\u2193\u2192  or  DRAG  to move',MX,MY-tFs*1.8);
      cx.fillText('SPACE  to fire  \u00B7  hold = auto-fire',MX,MY-tFs*1.0);
    }
    cx.fillStyle='rgba(255,255,255,.52)';cx.font=(tFs*.42)+'px monospace';
    cx.fillText('shoot the opponent \u2022 dodge red bolts \u2022 grab power-ups',MX,MY-tFs*.15);
    cx.fillText('\u26A1 rapid  \u00B7  \u221E auto  \u00B7  \u00BB speed  \u00B7  \u25C8 shield  \u00B7  \u2665 heal',MX,MY+tFs*.55);
    var ctaLabel=isMobile?'\u25BA  TAP TO BEGIN':'\u25BA  CLICK TO BEGIN';
    cx.font='bold '+(tFs*.55)+'px monospace';
    var ctaW=cx.measureText(ctaLabel).width+48;
    var ctaX=MX-ctaW/2,ctaY=MY+tFs*1.5,ctaH=tFs*1.4;
    // pulsing CTA
    var ctaPulse=0.85+0.15*Math.sin(Date.now()/300);
    cx.globalAlpha=ctaPulse;
    cx.fillStyle='#4fc3f7';
    cx.beginPath();cx.moveTo(ctaX+8,ctaY);cx.lineTo(ctaX+ctaW-8,ctaY);cx.arc(ctaX+ctaW-8,ctaY+8,8,-Math.PI/2,0);cx.lineTo(ctaX+ctaW,ctaY+ctaH-8);cx.arc(ctaX+ctaW-8,ctaY+ctaH-8,8,0,Math.PI/2);cx.lineTo(ctaX+8,ctaY+ctaH);cx.arc(ctaX+8,ctaY+ctaH-8,8,Math.PI/2,Math.PI);cx.lineTo(ctaX,ctaY+8);cx.arc(ctaX+8,ctaY+8,8,Math.PI,-Math.PI/2);cx.closePath();cx.fill();
    cx.globalAlpha=1;
    cx.fillStyle='#020408';cx.font='bold '+(tFs*.5)+'px monospace';cx.fillText(ctaLabel,MX,ctaY+ctaH/2);
    cx.textBaseline='alphabetic';
  }
}

function loop(ts){try{if(gameStarted)update(ts);draw(ts);}catch(err){console.error('loop error:',err);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
