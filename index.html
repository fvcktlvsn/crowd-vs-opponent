<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crowd vs Opponent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060a10;display:flex;justify-content:center;padding:20px 12px;min-height:100vh;}
#wrap{font-family:monospace;width:640px;max-width:100%;color:#c0d0e8;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.hud{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;}
.hud b{font-weight:700;color:#e8f0ff;}
#msg{text-align:center;font-size:11px;opacity:.4;padding:4px 0;color:#6888aa;}
.btns{display:flex;gap:8px;justify-content:center;padding:8px 0 4px;flex-wrap:wrap;}
.btns button{padding:7px 18px;border:1px solid #2a3a55;border-radius:8px;background:#0d1828;font-family:monospace;font-size:13px;cursor:pointer;color:#8ab0d8;touch-action:manipulation;}
.btns button:active{background:#162840;}
#bfire{color:#ef5350;border-color:#5a2020;}
</style>
</head>
<body>
<div id="wrap">
  <div class="hud">
    <span>crowd hp: <b id="php">800</b></span>
    <span id="scoreboard" style="font-size:11px;opacity:.5">0 &#8212; 0</span>
    <span>opponent hp: <b id="ehp">800</b></span>
  </div>
  <canvas id="g" style="display:block;cursor:crosshair;border-radius:8px;width:100%;height:auto;"></canvas>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;">
    <div id="msg" style="flex:1;">click arena to start &middot; arrows move &middot; space fires</div>
    <button id="bpause" style="padding:4px 12px;border:1px solid #2a3a55;border-radius:6px;background:#0d1828;font-family:monospace;font-size:11px;cursor:pointer;color:#8ab0d8;touch-action:manipulation;">&#9646;&#9646; pause</button>
  </div>
  <div class="btns">
    <button id="bu">&uarr;</button><button id="bl">&larr;</button>
    <button id="bfire">&bull; fire</button>
    <button id="br">&rarr;</button><button id="bd">&darr;</button>
  </div>
  <div style="text-align:center;font-size:9px;opacity:.25;padding:6px 0;color:#6888aa;">v1.6.0</div>
</div>

    var t=Math.random();

      layer:layer,
      x:Math.random()*W, y:Math.random()*H,
      sz:szR[0]+t*(szR[1]-szR[0]),
      sp:spR[0]+t*(spR[1]-spR[0]),
      streak:stR[0]+t*(stR[1]-stR[0]),
      br:brR[0]+t*(brR[1]-brR[0]),
      tw:Math.random()*Math.PI*2,
      ang:Math.PI/2
    });
  }
});

function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  Object.keys(SND_SRCS).forEach(function(name){
    fetch(SND_SRCS[name])
      .then(function(r){return r.arrayBuffer();})
      .then(function(ab){return actx.decodeAudioData(ab);})
      .then(function(buf){sndBufs[name]=buf;})
      .catch(function(e){console.warn('snd fail',name,e);});
  });
}
function resumeAudio(){if(!actx)initAudio();if(actx&&actx.state==='suspended')actx.resume();}
function onFirstGesture(){initAudio();if(actx&&actx.state==='suspended')actx.resume();}
document.addEventListener('touchstart',onFirstGesture,{once:true});
document.addEventListener('mousedown',onFirstGesture,{once:true});
document.addEventListener('keydown',onFirstGesture,{once:true});
function playBuf(name,vol,rate){
  try{if(!actx||!sndBufs[name])return;
  var src=actx.createBufferSource();src.buffer=sndBufs[name];
  if(rate)src.playbackRate.value=rate;
  var g=actx.createGain();g.gain.value=vol||1;
  src.connect(g);g.connect(actx.destination);src.start();}catch(e){}
}
// player shoot: pistol normally, rapid1 when rapid/auto powerup is active
function sndShoot(isRapid){if(isRapid){playBuf('rapid',0.65,1.0);}else{playBuf('pistol',0.85,1.0);}}
function sndShootEnemy(){playBuf('stormtrooper',0.6,1.0);}
function sndHit(){playBuf('hit',0.9,1.0);}
var PU_SNDs={rapid:'pu1',auto:'pu2',speed:'pu3',shield:'pu4',heal:'pu1'};function sndPow(type){playBuf(PU_SNDs[type]||'pu1',0.75,1.0);}
function sndWin(){try{if(!actx)return;var a=actx,t=a.currentTime;[440,554,659,880].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.2);o.connect(g);g.connect(a.destination);o.start(t+i*.08);o.stop(t+i*.08+.22);});}catch(e){}}
function sndLose(){try{if(!actx)return;var a=actx,t=a.currentTime;[330,220,165,110].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.25);o.connect(g);g.connect(a.destination);o.start(t+i*.1);o.stop(t+i*.1+.27);});}catch(e){}}

  cx.beginPath();
  cx.arc(0,-r*.18,r*.88,Math.PI,0,false);
  cx.closePath();cx.fill();

// Opponent — Trump photo face, flips toward player
function drawTrump(x,y,sz,expr){
  var r=sz*2.0;
  // Map expressions to face images
  var imgKey;
  if(expr==='hit')         imgKey='t_grimace';
  else if(expr==='panic')  imgKey='t_dazed';
  else if(expr==='pissed') imgKey='t_grumpy';
  else if(expr==='fire')   imgKey='t_sidesmug';
  else if(expr==='smug')   imgKey='t_pucker';
  else                     imgKey=idleExpr;
  // Fallback if key missing
  if(!TIMG[imgKey]) imgKey='t_neutral';

  // Player direction — used for flip and look offset
  var pdx=P.x-x, pdy=P.y-y, pdist=Math.hypot(pdx,pdy)||1;
  var facingLeft=(pdx<0);
  var lookX=(pdx/pdist)*r*0.12;
  var lookY=(pdy/pdist)*r*0.08;

  cx.save();
  cx.translate(x,y);
  // Clip circle
  cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.clip();

  var img=TIMG[imgKey]||TIMG['t_neutral'];
  if(img&&img.complete&&img.naturalWidth>0){
    var scale=Math.max(r*2.2/img.naturalWidth, r*2.2/img.naturalHeight);
    var dw=img.naturalWidth*scale, dh=img.naturalHeight*scale;
    // Flip toward player
    if(facingLeft){ cx.scale(-1,1); lookX=-lookX; }
    cx.drawImage(img,-dw/2+lookX,-dh*0.46+lookY,dw,dh);
  } else {
    cx.fillStyle='#e8a06a';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  }

  // Hit overlay
  if(expr==='hit'){
    cx.fillStyle='rgba(255,50,50,0.30)';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
    cx.font='bold '+(r*.38|0)+'px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    var sc=facingLeft?-1:1; if(facingLeft)cx.scale(-1,1);
    for(var si=0;si<3;si++){var sa=jaw*4+si*2.09;cx.fillStyle='#ffeb3b';cx.fillText('\u2605',Math.cos(sa)*r*.9,Math.sin(sa)*r*.9);}
  }
  // Panic sweat
  if(expr==='panic'){
    cx.fillStyle='rgba(140,215,255,0.8)';
    for(var pi=0;pi<3;pi++){var ps=Math.abs(Math.sin(jaw*2+pi*1.4));cx.beginPath();cx.arc((-1+pi)*r*.5,-r*.34+ps*r*.34,r*.055,0,Math.PI*2);cx.fill();}
  }
  cx.restore();
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);
  cx.strokeStyle='rgba(0,0,0,0.20)';cx.lineWidth=r*.030;cx.stroke();
}

if(b.x<=2||b.x>=W-2){if(b.bounces>0){b.vx*=-1;b.x=b.x<=2?3:W-3;b.ang=Math.atan2(b.vy,b.vx);b.bounces--;}else return false;}
if(b.y<=2||b.y>=H-2){if(b.bounces>0){b.vy*=-1;b.y=b.y<=2?3:H-3;b.ang=Math.atan2(b.vy,b.vx);b.bounces--;}else return false;}
if(b.owner==='e'&&Math.hypot(b.x-P.x,b.y-P.y)<P.sz*1.6+16){if(P.ef!=='shield'){P.hp=Math.max(0,P.hp-13);P.sz=Math.max(MIN_SZ,P.sz-4);shake2(5);sndHit();setC('hit',18);}spawnFlash(b.x,b.y,'#0d0');if(ts-lastTaunt>2200&&Math.random()<.4){addTaunt(TH[Math.floor(Math.random()*TH.length)]);lastTaunt=ts;setT('smug',28);}return false;}if(b.owner==='p'&&Math.hypot(b.x-E.x,b.y-E.y)<E.sz*1.6+16){E.hp=Math.max(0,E.hp-12);E.sz=Math.max(MIN_SZ,E.sz-4);setT(E.hp<MAX_HP*.3?'panic':'hit',14);shake2(3);sndHit();spawnFlash(b.x,b.y,'#f00');return false;}return b.life>0;});
flashes=flashes.filter(function(f){f.x+=f.vx;f.y+=f.vy;f.life--;return f.life>0;});taunts=taunts.filter(function(t){t.life--;return t.life>0;});if(shake.life>0)shake.life--;document.getElementById('php').textContent=Math.max(0,P.hp);document.getElementById('ehp').textContent=Math.max(0,E.hp);if(P.hp<=0||E.hp<=0){over=true;win=E.hp<=0?'crowd':'opponent';shake.life=0;if(win==='crowd'){pScore++;sndWin();setT('panic',9999);}else{eScore++;sndLose();setT('smug',28);setC('hit',18);}document.getElementById('scoreboard').textContent=pScore+' \u2014 '+eScore;setTimeout(function(){round++;init();},3000);}}

// blaster bolt
function drawBolt(b){var isP=b.owner==='p';var coreCol=isP?'#ff4444':'#44ff66';var glowCol=isP?'rgba(255,50,50,':'rgba(50,255,80,';var nx=Math.cos(b.ang),ny=Math.sin(b.ang),len=18,w=2.5;cx.save();cx.lineCap='round';cx.strokeStyle=glowCol+'0.25)';cx.lineWidth=w*6;cx.beginPath();cx.moveTo(b.x-nx*len*.5,b.y-ny*len*.5);cx.lineTo(b.x+nx*len*.5,b.y+ny*len*.5);cx.stroke();cx.strokeStyle=glowCol+'0.5)';cx.lineWidth=w*3;cx.beginPath();cx.moveTo(b.x-nx*len*.4,b.y-ny*len*.4);cx.lineTo(b.x+nx*len*.5,b.y+ny*len*.5);cx.stroke();cx.strokeStyle=coreCol;cx.lineWidth=w*1.5;cx.beginPath();cx.moveTo(b.x-nx*len*.3,b.y-ny*len*.3);cx.lineTo(b.x+nx*len*.45,b.y+ny*len*.45);cx.stroke();cx.strokeStyle='rgba(255,255,255,0.9)';cx.lineWidth=w*.7;cx.beginPath();cx.moveTo(b.x-nx*len*.15,b.y-ny*len*.15);cx.lineTo(b.x+nx*len*.35,b.y+ny*len*.35);cx.stroke();cx.fillStyle='#fff';cx.beginPath();cx.arc(b.x+nx*len*.4,b.y+ny*len*.4,w*.8,0,Math.PI*2);cx.fill();cx.restore();}

// draw starfield to offscreen canvas then composite blurred
function drawStars(ts){
  var pdx=(P.x-MX)/MX, pdy=(P.y-MY)/MY;
  var steerAng=Math.PI/2 + pdx*.4 - pdy*.25;
  // layer colours: far=cool blue-white, mid=white, near=slightly warm white
  var layerCtx=[sxFar,sxMid,sxNear];
  var layerRGB=[
    [160,185,255],  // far  — cool blue
    [200,215,255],  // mid  — neutral
    [235,240,255]   // near — crisp white
  ];
  sxFar.clearRect(0,0,W,H);
  sxMid.clearRect(0,0,W,H);
  sxNear.clearRect(0,0,W,H);
  for(var i=0;i<stars.length;i++){
    var st=stars[i];
    var sc=layerCtx[st.layer],rgb=layerRGB[st.layer];
    // far layer barely steers — gives slow dreamy drift
    var steerStrength=[0.004, 0.012, 0.025][st.layer];
    st.ang+=(steerAng-st.ang)*steerStrength;
    var ca=Math.cos(st.ang),sa2=Math.sin(st.ang);
    st.x+=ca*st.sp; st.y+=sa2*st.sp; st.tw+=.015;
    if(st.y>H+40)st.y=-40; if(st.y<-40)st.y=H+40;
    if(st.x>W+40)st.x=-40; if(st.x<-40)st.x=W+40;
    var twinkle=st.br*(.55+Math.sin(st.tw)*.45);
    var tx=st.x-ca*st.streak, ty=st.y-sa2*st.streak;
    var gr=sc.createLinearGradient(tx,ty,st.x,st.y);
    gr.addColorStop(0,'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0)');
    gr.addColorStop(.5,'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(twinkle*.35).toFixed(3)+')');
    gr.addColorStop(1,'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+twinkle.toFixed(3)+')');
    sc.strokeStyle=gr; sc.lineWidth=st.sz; sc.lineCap='round';
    sc.beginPath(); sc.moveTo(tx,ty); sc.lineTo(st.x,st.y); sc.stroke();
    // near layer: add a sharp bright dot at the head for extra crispness
    if(st.layer===2){
      sc.fillStyle='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(twinkle*.9).toFixed(3)+')';
      sc.beginPath(); sc.arc(st.x,st.y,st.sz*.7,0,Math.PI*2); sc.fill();
    }
  }
}

function draw(ts){
  cx.setTransform(1,0,0,1,0,0);cx.globalAlpha=1;

  // space background
  cx.fillStyle='#060a10';cx.fillRect(0,0,W,H);
  // nebula
  var ng=cx.createRadialGradient(W*.3,H*.4,0,W*.3,H*.4,W*.5);ng.addColorStop(0,'rgba(30,10,60,.12)');ng.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=ng;cx.fillRect(0,0,W,H);
  var ng2=cx.createRadialGradient(W*.75,H*.6,0,W*.75,H*.6,W*.4);ng2.addColorStop(0,'rgba(10,30,60,.1)');ng2.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=ng2;cx.fillRect(0,0,W,H);

  // blurred starfield — DOF: far=heavy blur, mid=soft, near=sharp
  drawStars(ts);
  cx.save();
  // FAR layer — heavy blur, dim (simulates out-of-focus background)
  cx.filter='blur(5px)';
  cx.globalAlpha=.55;
  cx.drawImage(scvFar,0,0);
  // MID layer — gentle blur
  cx.filter='blur(1.5px)';
  cx.globalAlpha=.75;
  cx.drawImage(scvMid,0,0);
  // NEAR layer — crisp, no blur, full brightness
  cx.filter='none';
  cx.globalAlpha=0.95;
  cx.drawImage(scvNear,0,0);
  cx.globalAlpha=1;
  cx.restore();

  // shake
  var ox=0,oy=0;if(shake.life>0&&!over){var sa=shake.amt*(shake.life/8)*.4;ox=(Math.random()-.5)*sa*2;oy=(Math.random()-.5)*sa*2;}cx.translate(ox,oy);

  // subtle edge vignette
  var vg=cx.createRadialGradient(MX,MY,Math.min(W,H)*.3,MX,MY,Math.max(W,H)*.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.35)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);

  // powerups
  pups.forEach(function(pu){var pulse=.88+Math.sin(ts*.005)*.12;cx.beginPath();cx.arc(pu.x,pu.y,10*pulse,0,Math.PI*2);cx.fillStyle=pu.t.col+'33';cx.fill();cx.strokeStyle=pu.t.col;cx.lineWidth=1.5;cx.stroke();cx.fillStyle=pu.t.col;cx.font='11px monospace';cx.textAlign='center';cx.fillText(pu.t.glyph,pu.x,pu.y+4);});

  bullets.forEach(drawBolt);
  flashes.forEach(function(f){var fa=f.life/f.max;cx.fillStyle=f.col;cx.globalAlpha=fa;cx.beginPath();cx.arc(f.x,f.y,3*fa,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;

  // HP rings
  [P,E].forEach(function(ent,i){var rcol=i===0?'#4fc3f7':'#ef5350',ratio=ent.hp/MAX_HP;cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+6,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);cx.strokeStyle=ratio>.35?rcol:'#ffb74d';cx.lineWidth=2.5;cx.stroke();if(ent.ef==='shield'){cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+12,0,Math.PI*2);cx.strokeStyle='rgba(186,104,200,.65)';cx.lineWidth=2;cx.stroke();}if(ent.ef==='auto'){cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+12,0,Math.PI*2);cx.strokeStyle='rgba(233,30,99,.55)';cx.lineWidth=2;cx.stroke();}var gmap={rapid:'\u26A1',auto:'\u221E',speed:'\u00BB',shield:'\u25C8'},cmap={rapid:'#f57c00',auto:'#e91e63',speed:'#388e3c',shield:'#7b1fa2'};if(ent.ef&&gmap[ent.ef]){cx.fillStyle=cmap[ent.ef];cx.font='bold 12px monospace';cx.textAlign='center';cx.fillText(gmap[ent.ef],ent.x,ent.y-ent.sz*2.2-14);}});

  drawCanadian(P.x,P.y,P.sz,cE);drawTrump(E.x,E.y,E.sz,tE);

  taunts.forEach(function(t){var alpha=Math.min(1,t.life/20),yOff=-E.sz*3-20-(1-t.life/130)*10;cx.globalAlpha=alpha;cx.font='bold 10px monospace';cx.textAlign='center';cx.textBaseline='middle';var tw2=cx.measureText(t.txt).width+18;cx.fillStyle='#fffde7';cx.beginPath();cx.arc(E.x-tw2/2+9,E.y+yOff,9,Math.PI*.5,Math.PI*1.5);cx.arc(E.x+tw2/2-9,E.y+yOff,9,Math.PI*1.5,Math.PI*.5);cx.closePath();cx.fill();cx.strokeStyle='#f9a825';cx.lineWidth=1;cx.stroke();cx.fillStyle='#333';cx.fillText(t.txt,E.x,E.y+yOff);cx.globalAlpha=1;cx.textBaseline='alphabetic';});

  if(drag){cx.strokeStyle='rgba(79,195,247,.3)';cx.lineWidth=1;cx.setLineDash([4,4]);cx.beginPath();cx.arc(P.x,P.y,P.sz*2.2+12,0,Math.PI*2);cx.stroke();cx.setLineDash([]);}
  if(!focused){cx.fillStyle='rgba(6,10,20,.6)';cx.fillRect(0,H-26,W,26);cx.fillStyle='rgba(79,195,247,.5)';cx.font='11px monospace';cx.textAlign='center';cx.fillText(isMobile?'tap to start \u2014 drag to move \u2014 auto-fires':'click here to enable keyboard controls',MX,H-9);}
  if(over){cx.fillStyle='rgba(4,8,16,.75)';cx.fillRect(0,0,W,H);cx.fillStyle=win==='crowd'?'#4fc3f7':'#ef5350';cx.font='bold 22px monospace';cx.textAlign='center';cx.fillText(win==='crowd'?'CROWD WINS!':'OPPONENT WINS!',MX,MY-16);cx.fillStyle='rgba(255,255,255,.5)';cx.font='12px monospace';cx.fillText('score  '+pScore+' \u2014 '+eScore,MX,MY+6);cx.fillStyle='rgba(255,255,255,.25)';cx.font='11px monospace';cx.fillText('next round starting\u2026',MX,MY+28);}
  if(paused&&!over){cx.fillStyle='rgba(4,8,16,.6)';cx.fillRect(0,0,W,H);cx.fillStyle='#4fc3f7';cx.font='bold 24px monospace';cx.textAlign='center';cx.fillText('PAUSED',MX,MY-8);cx.fillStyle='rgba(255,255,255,.35)';cx.font='11px monospace';cx.fillText(isMobile?'tap pause to resume':'press P or ESC to resume',MX,MY+14);}
  cx.setTransform(1,0,0,1,0,0);
}

function loop(ts){try{update(ts);draw(ts);}catch(err){console.error('loop error:',err);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
