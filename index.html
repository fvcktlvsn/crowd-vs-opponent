<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crowd vs Opponent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#020408;overflow-x:hidden;min-height:100vh;min-height:100dvh;}
body{display:flex;justify-content:center;padding:8px 6px;min-height:100vh;min-height:100dvh;}
#wrap{font-family:monospace;width:100%;max-width:1100px;color:#c0d0e8;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.hud{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;}
.hud b{font-weight:700;color:#e8f0ff;}
#msg{text-align:center;font-size:11px;opacity:.4;padding:4px 0;color:#6888aa;}
.btns{display:flex;gap:8px;justify-content:center;padding:8px 0 4px;flex-wrap:wrap;}
.btns button{padding:7px 18px;border:1px solid #2a3a55;border-radius:8px;background:#0d1828;font-family:monospace;font-size:13px;cursor:pointer;color:#8ab0d8;touch-action:manipulation;}
.btns button:active{background:#162840;}
#bfire{color:#ef5350;border-color:#5a2020;}
#g{display:block;cursor:crosshair;border-radius:8px;width:100%;height:auto;}
</style>
</head>
<body>
<div id="wrap">
  <div class="hud">
    <span>crowd hp: <b id="php">800</b></span>
    <span id="scoreboard" style="font-size:11px;opacity:.5">0 &#8212; 0</span><span id="bossbanner" style="font-size:11px;color:#ffaa00;font-weight:bold;display:none">&#9888; BOSS ROUND &#9888;</span>
    <span>opponent hp: <b id="ehp">800</b></span>
  </div>
  <canvas id="g"></canvas>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;">
    <div id="msg" style="flex:1;">click arena to start &middot; arrows move &middot; space fires</div>
    <button id="bpause" style="padding:4px 12px;border:1px solid #2a3a55;border-radius:6px;background:#0d1828;font-family:monospace;font-size:11px;cursor:pointer;color:#8ab0d8;touch-action:manipulation;">&#9646;&#9646; pause</button>
  </div>
  <div class="btns">
    <button id="bu">&uarr;</button><button id="bl">&larr;</button>
    <button id="bfire">&bull; fire</button>
    <button id="br">&rarr;</button><button id="bd">&darr;</button>
  </div>
  <div style="text-align:center;font-size:9px;opacity:.25;padding:6px 0;color:#6888aa;">v3.0.1</div>
</div>
<script src="assets.js"></script>
<script>
(function(){
var cv=document.getElementById('g'),cx=cv.getContext('2d');

// === RESPONSIVE SIZING ===
var isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
var W,H;
function sizeCanvas(){
  var wrap=document.getElementById('wrap');
  var maxW=wrap.clientWidth;
  // desktop: fill most of the viewport height; mobile: taller
  var viewH=window.innerHeight||document.documentElement.clientHeight;
  if(isMobile){
    // mobile: use most of viewport height minus HUD/buttons (~140px)
    var availH=viewH-160;
    W=maxW;
    H=Math.max(400,Math.min(availH,maxW*1.3));
  } else {
    // desktop: use ~80% of viewport height, cap width
    var availH2=viewH*0.78;
    W=Math.min(maxW,1100);
    H=Math.max(420,Math.min(availH2,W*0.7));
  }
  W=Math.round(W);H=Math.round(H);
  cv.width=W;cv.height=H;
  // update offscreen canvases
  [scvFar,scvMid,scvNear].forEach(function(c){if(c){c.width=W;c.height=H;}});
  MX=W/2;MY=H/2;
  // regenerate stars for new size
  regenerateStars();
}
var MX,MY;

if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arc(x+w-r,y+r,r,-Math.PI/2,0);this.lineTo(x+w,y+h-r);this.arc(x+w-r,y+h-r,r,0,Math.PI/2);this.lineTo(x+r,y+h);this.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);this.lineTo(x,y+r);this.arc(x+r,y+r,r,Math.PI,-Math.PI/2);this.closePath();return this;};}
var PAD=4;
var MAX_HP=800,MAX_SZ=20,MIN_SZ=12,FRICTION=.83,ACCEL=.48,DODGE_R=120;

// offscreen canvases for DOF blur
function mkLayer(){var c=document.createElement('canvas');c.width=W||800;c.height=H||500;return c;}
var scvFar=mkLayer(),scvMid=mkLayer(),scvNear=mkLayer();
var sxFar=scvFar.getContext('2d'),sxMid=scvMid.getContext('2d'),sxNear=scvNear.getContext('2d');

// === PARALLAX SPACE ENVIRONMENT ===
// 3 depth layers, all blurred at composite time — never competes with gameplay
var spaceObjs=[];
function regenerateStars(){
  spaceObjs=[];
  // --- FAR (layer 0): large slow planets, dim stars ---
  for(var i=0;i<80;i++){
    spaceObjs.push({type:'star',layer:0,x:Math.random()*W,y:Math.random()*H,sz:0.5+Math.random()*0.8,sp:0.15+Math.random()*0.4,br:0.12+Math.random()*0.18,tw:Math.random()*Math.PI*2,ang:Math.PI/2+Math.random()*0.06-0.03});
  }
  var farPC=[
    {fill:'rgba(70,90,150,.18)',hi:'rgba(110,130,180,.12)',r:null},
    {fill:'rgba(120,85,55,.16)',hi:'rgba(170,120,80,.10)',r:'rgba(180,160,130,.08)'},
    {fill:'rgba(80,55,100,.15)',hi:'rgba(120,80,140,.09)',r:null}
  ];
  for(var fp=0;fp<3;fp++){var fc=farPC[fp%3];spaceObjs.push({type:'planet',layer:0,x:Math.random()*W,y:Math.random()*H,sz:30+Math.random()*50,sp:0.12+Math.random()*0.18,fill:fc.fill,hi:fc.hi,ring:fc.r});}

  // --- MID (layer 1): medium planets with rings, dust clouds, stars ---
  for(var j=0;j<50;j++){
    spaceObjs.push({type:'star',layer:1,x:Math.random()*W,y:Math.random()*H,sz:0.5+Math.random()*1.0,sp:0.5+Math.random()*1.0,br:0.15+Math.random()*0.22,tw:Math.random()*Math.PI*2,ang:Math.PI/2+Math.random()*0.1-0.05});
  }
  var midPC=[
    {fill:'rgba(90,70,45,.20)',hi:'rgba(140,110,70,.12)',r:null},
    {fill:'rgba(55,80,120,.18)',hi:'rgba(80,110,160,.11)',r:'rgba(130,150,180,.09)'},
    {fill:'rgba(100,65,80,.16)',hi:'rgba(150,90,110,.10)',r:null},
    {fill:'rgba(65,100,65,.15)',hi:'rgba(90,140,90,.09)',r:'rgba(110,140,100,.07)'}
  ];
  for(var mp=0;mp<4;mp++){var mc=midPC[mp%4];spaceObjs.push({type:'planet',layer:1,x:Math.random()*W,y:Math.random()*H,sz:10+Math.random()*22,sp:0.4+Math.random()*0.6,fill:mc.fill,hi:mc.hi,ring:mc.r});}
  for(var dc=0;dc<3;dc++){spaceObjs.push({type:'dust',layer:1,x:Math.random()*W,y:Math.random()*H,sz:40+Math.random()*60,sp:0.3+Math.random()*0.4,col:'rgba('+(25+Math.random()*40|0)+','+(35+Math.random()*50|0)+','+(70+Math.random()*80|0)+',.06)',ang:Math.PI/2});}

  // --- NEAR-ISH (layer 2): small planets, fine dust, dim wisps ---
  for(var k=0;k<30;k++){
    spaceObjs.push({type:'star',layer:2,x:Math.random()*W,y:Math.random()*H,sz:0.4+Math.random()*0.6,sp:1.0+Math.random()*1.5,br:0.08+Math.random()*0.14,tw:Math.random()*Math.PI*2,ang:Math.PI/2+Math.random()*0.08-0.04});
  }
  for(var sp2=0;sp2<3;sp2++){spaceObjs.push({type:'planet',layer:2,x:Math.random()*W,y:Math.random()*H,sz:5+Math.random()*10,sp:0.8+Math.random()*0.8,fill:'rgba(80,70,55,.14)',hi:'rgba(120,105,80,.09)',ring:null});}
  for(var mw=0;mw<3;mw++)spawnWisp();
}
function spawnWisp(){spaceObjs.push({type:'wisp',layer:2,x:-30+Math.random()*W*0.5,y:-30+Math.random()*H*0.3,sp:2.0+Math.random()*2.5,ang:Math.PI*0.38+Math.random()*0.24,life:70+Math.random()*60,maxLife:70+Math.random()*60,len:25+Math.random()*35});}

function drawSpaceLayer(layerIdx,sc){
  for(var i=0;i<spaceObjs.length;i++){
    var o=spaceObjs[i];if(o.layer!==layerIdx)continue;
    if(o.type==='star'){
      o.x+=Math.cos(o.ang)*o.sp;o.y+=Math.sin(o.ang)*o.sp;o.tw+=0.01;
      if(o.y>H+10)o.y=-10;if(o.y<-10)o.y=H+10;if(o.x>W+10)o.x=-10;if(o.x<-10)o.x=W+10;
      sc.fillStyle='rgba(180,200,255,'+(o.br*(.5+Math.sin(o.tw)*.5)).toFixed(3)+')';
      sc.beginPath();sc.arc(o.x,o.y,o.sz,0,Math.PI*2);sc.fill();
    } else if(o.type==='planet'){
      o.y+=o.sp;o.x-=o.sp*0.15;
      if(o.y>H+o.sz*2){o.y=-o.sz*2;o.x=Math.random()*W;}if(o.x<-o.sz*3)o.x=W+o.sz;
      var pg=sc.createRadialGradient(o.x-o.sz*.25,o.y-o.sz*.25,0,o.x,o.y,o.sz);
      pg.addColorStop(0,o.hi);pg.addColorStop(1,o.fill);
      sc.fillStyle=pg;sc.beginPath();sc.arc(o.x,o.y,o.sz,0,Math.PI*2);sc.fill();
      sc.fillStyle='rgba(0,0,0,.04)';sc.beginPath();sc.arc(o.x+o.sz*.2,o.y+o.sz*.15,o.sz*.35,0,Math.PI*2);sc.fill();
      if(o.ring){sc.strokeStyle=o.ring;sc.lineWidth=o.sz*0.12;sc.beginPath();sc.ellipse(o.x,o.y,o.sz*1.7,o.sz*0.28,0.25,0,Math.PI*2);sc.stroke();}
    } else if(o.type==='dust'){
      o.y+=o.sp;o.x-=o.sp*0.1;if(o.y>H+o.sz)o.y=-o.sz;
      var dg=sc.createRadialGradient(o.x,o.y,0,o.x,o.y,o.sz);dg.addColorStop(0,o.col);dg.addColorStop(1,'rgba(0,0,0,0)');
      sc.fillStyle=dg;sc.fillRect(o.x-o.sz,o.y-o.sz,o.sz*2,o.sz*2);
    } else if(o.type==='wisp'){
      o.life--;o.x+=Math.cos(o.ang)*o.sp;o.y+=Math.sin(o.ang)*o.sp;
      if(o.life>0){var wa=o.life/o.maxLife,nx=Math.cos(o.ang),ny=Math.sin(o.ang);
      sc.strokeStyle='rgba(180,200,255,'+(wa*0.08).toFixed(3)+')';sc.lineWidth=1;sc.lineCap='round';
      sc.beginPath();sc.moveTo(o.x-nx*o.len,o.y-ny*o.len);sc.lineTo(o.x,o.y);sc.stroke();
      sc.fillStyle='rgba(220,240,255,'+(wa*0.14).toFixed(3)+')';sc.beginPath();sc.arc(o.x,o.y,1,0,Math.PI*2);sc.fill();}
    }
  }
  spaceObjs=spaceObjs.filter(function(o){return o.type!=='wisp'||o.life>0;});
  if(Math.random()<0.015)spawnWisp();
}

function oval(ox,oy,rx,ry){var k=.552;cx.beginPath();cx.moveTo(ox,oy-ry);cx.bezierCurveTo(ox+rx*k,oy-ry,ox+rx,oy-ry*k,ox+rx,oy);cx.bezierCurveTo(ox+rx,oy+ry*k,ox+rx*k,oy+ry,ox,oy+ry);cx.bezierCurveTo(ox-rx*k,oy+ry,ox-rx,oy+ry*k,ox-rx,oy);cx.bezierCurveTo(ox-rx,oy-ry*k,ox-rx*k,oy-ry,ox,oy-ry);cx.closePath();}

// =====================================================
// ASSETS loaded from assets.js (SND_SRCS, TIMG_SRCS, PIMG_SRC)
// =====================================================
var actx=null;
var sndBufs={};
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  Object.keys(SND_SRCS).forEach(function(name){
    if(SND_SRCS[name]==='PUT_BASE64_HERE')return;
    fetch(SND_SRCS[name])
      .then(function(r){return r.arrayBuffer();})
      .then(function(ab){return actx.decodeAudioData(ab);})
      .then(function(buf){sndBufs[name]=buf;})
      .catch(function(e){console.warn('snd fail',name,e);});
  });
}
function resumeAudio(){if(!actx)initAudio();if(actx&&actx.state==='suspended')actx.resume();}
function onFirstGesture(){initAudio();if(actx&&actx.state==='suspended')actx.resume();}
document.addEventListener('touchstart',onFirstGesture,{once:true});
document.addEventListener('mousedown',onFirstGesture,{once:true});
document.addEventListener('keydown',onFirstGesture,{once:true});
function playBuf(name,vol,rate){
  try{if(!actx||!sndBufs[name])return;
  var src=actx.createBufferSource();src.buffer=sndBufs[name];
  if(rate)src.playbackRate.value=rate;
  var g=actx.createGain();g.gain.value=vol||1;
  src.connect(g);g.connect(actx.destination);src.start();}catch(e){}
}
function sndShoot(isRapid){if(isRapid){playBuf('rapid',0.65,1.0);}else{playBuf('pistol',0.85,1.0);}}
function sndShootEnemy(){playBuf('stormtrooper',0.6,1.0);}
function sndHit(){playBuf('hit',0.9,1.0);}
var PU_SNDs={rapid:'pu1',auto:'pu2',speed:'pu3',shield:'pu4',heal:'pu1'};function sndPow(type){playBuf(PU_SNDs[type]||'pu1',0.75,1.0);}
function sndWin(){try{if(!actx)return;var a=actx,t=a.currentTime;[440,554,659,880].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.2);o.connect(g);g.connect(a.destination);o.start(t+i*.08);o.stop(t+i*.08+.22);});}catch(e){}}
function sndLose(){try{if(!actx)return;var a=actx,t=a.currentTime;[330,220,165,110].forEach(function(freq,i){var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=freq;g.gain.setValueAtTime(.1,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.25);o.connect(g);g.connect(a.destination);o.start(t+i*.1);o.stop(t+i*.1+.27);});}catch(e){}}

// Load opponent face images from TIMG_SRCS (defined in assets.js)
var TIMG={};
Object.keys(TIMG_SRCS).forEach(function(k){
  if(TIMG_SRCS[k]==='PUT_BASE64_HERE')return;
  var img=new Image();img.src=TIMG_SRCS[k];TIMG[k]=img;
});
var tFace='t_idle',tFaceTimer=0;
function setTFace(key,dur){tFace=key;tFaceTimer=dur;}

var cE='normal',cT=0,jaw=0;
function setC(e,d){cE=e;cT=d||90;}

// Player avatar image (loaded from PIMG_SRC in assets.js)
var PIMG=new Image();
if(typeof PIMG_SRC!=='undefined'&&PIMG_SRC!=='PUT_BASE64_HERE')PIMG.src=PIMG_SRC;

// Player draw — photo-based with animated expression overlays
function drawCanadian(x,y,sz,expr){
  var r=sz*2.0;
  cx.save();cx.translate(x,y);
  // white circle base
  cx.fillStyle='#ffffff';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  // clip to circle and draw photo — centered for square images
  cx.save();
  cx.beginPath();cx.arc(0,0,r*.98,0,Math.PI*2);cx.clip();
  if(PIMG&&PIMG.complete&&PIMG.naturalWidth>0){
    var dim=r*2.05;
    cx.drawImage(PIMG,0,0,PIMG.naturalWidth,PIMG.naturalHeight,-dim/2,-dim*0.46,dim,dim);
  } else {
    // fallback — orange pilot circle
    cx.fillStyle='#e89030';cx.beginPath();cx.arc(0,0,r*.7,0,Math.PI*2);cx.fill();
    cx.fillStyle='#fff';cx.font='bold '+(r*.6)+'px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('\u2726',0,0);
  }
  // expression overlays — positioned on the visor/face area of the lego figure
  if(expr==='hit'){
    // red flash overlay
    cx.fillStyle='rgba(255,20,20,.32)';cx.fillRect(-r,-r,r*2,r*2);
    // X eyes over visor area — shifted down to face
    var eyY=r*.12,eyX=r*.18,eyR=r*.09;
    cx.strokeStyle='#ff1111';cx.lineWidth=r*.09;cx.lineCap='round';
    [-eyX,eyX].forEach(function(ex){
      cx.beginPath();cx.moveTo(ex-eyR,eyY-eyR);cx.lineTo(ex+eyR,eyY+eyR);cx.stroke();
      cx.beginPath();cx.moveTo(ex+eyR,eyY-eyR);cx.lineTo(ex-eyR,eyY+eyR);cx.stroke();
    });
  } else if(expr==='fire'){
    // angry orange glow at edges
    cx.fillStyle='rgba(255,120,0,.12)';cx.fillRect(-r,-r,r*2,r*2);
    // angry brow lines over visor — shifted down to face
    var eyY2=r*.08,eyX2=r*.18,eyR2=r*.12;
    cx.strokeStyle='rgba(255,80,0,.8)';cx.lineWidth=r*.07;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-eyX2-eyR2,eyY2-eyR2*1.6);cx.lineTo(-eyX2+eyR2,eyY2-eyR2*.8);cx.stroke();
    cx.beginPath();cx.moveTo(eyX2+eyR2,eyY2-eyR2*1.6);cx.lineTo(eyX2-eyR2,eyY2-eyR2*.8);cx.stroke();
  }
  cx.restore(); // unclip
  // circle outline
  cx.restore(); // untranslate
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.30)';cx.lineWidth=r*.038;cx.stroke();
}

// Opponent draw
function drawTrump(x,y,sz,expr){
  var r=sz*2.0;
  var imgKey=tFace;if(!TIMG[imgKey])imgKey='t_idle';
  cx.save();cx.translate(x,y);
  cx.fillStyle='#ffffff';cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.clip();
  var img=TIMG[imgKey]||TIMG['t_idle'];
  if(img&&img.complete&&img.naturalWidth>0){
    var scale=Math.max(r*2.12/img.naturalWidth,r*2.12/img.naturalHeight);
    var dw=img.naturalWidth*scale,dh=img.naturalHeight*scale;
    cx.drawImage(img,-dw/2,-dh*0.44,dw,dh);
  } else {
    // fallback circle if images not loaded
    cx.fillStyle='#e8a040';cx.beginPath();cx.arc(0,0,r*.7,0,Math.PI*2);cx.fill();
    cx.fillStyle='#333';cx.font=(r*.5)+'px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('?',0,0);
  }
  cx.restore();
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.28)';cx.lineWidth=r*.036;cx.stroke();
}

// state
function mkE(px,py){return{x:px,y:py,vx:0,vy:0,ang:0,hp:MAX_HP,sz:MAX_SZ,ef:null,eft:0};}
var round=1,pScore=0,eScore=0,P,E,bullets,pups,pFire,eFire,puT,over,win,flashes,taunts,lastTaunt=0;
var gameStarted=false;
var isBoss=false;
var bossAnnounce=0; // countdown frames for boss announcement overlay
var combo=0,comboTimer=0,comboLabel="",comboLabelTimer=0;
var shake={life:0,amt:0};
// Death Star explosion effect
var deathStarExplosion={active:false,x:0,y:0,frame:0,maxFrames:120,rings:[],debris:[],flashAlpha:0};
function triggerDeathStar(ex,ey){
  var ds=deathStarExplosion;
  ds.active=true;ds.x=ex;ds.y=ey;ds.frame=0;ds.flashAlpha=1.0;
  ds.rings=[];ds.debris=[];
  // create expanding rings
  for(var ri=0;ri<5;ri++){ds.rings.push({delay:ri*12,r:0,maxR:Math.max(W,H)*0.8,alpha:1,width:4+ri*3,color:ri<2?'#ffffff':ri<4?'#ff8800':'#ff3300'});}
  // create debris particles
  for(var di=0;di<60;di++){
    var ang=Math.random()*Math.PI*2,spd=2+Math.random()*8;
    var cols=['#ff4400','#ff8800','#ffcc00','#ffffff','#ff2200','#ffaa44'];
    ds.debris.push({x:ex,y:ey,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,sz:2+Math.random()*5,life:60+Math.random()*50,maxLife:60+Math.random()*50,col:cols[Math.floor(Math.random()*cols.length)]});
  }
}
function updateDeathStar(){
  var ds=deathStarExplosion;if(!ds.active)return;
  ds.frame++;
  ds.flashAlpha=Math.max(0,ds.flashAlpha-0.025);
  ds.rings.forEach(function(ring){if(ds.frame>ring.delay){ring.r+=((ds.maxR||500)-ring.r)*0.06+3;ring.alpha=Math.max(0,ring.alpha-0.012);}});
  ds.debris.forEach(function(d){d.x+=d.vx;d.y+=d.vy;d.vx*=0.98;d.vy*=0.98;d.life--;});
  ds.debris=ds.debris.filter(function(d){return d.life>0;});
  if(ds.frame>=ds.maxFrames)ds.active=false;
}
function drawDeathStar(){
  var ds=deathStarExplosion;if(!ds.active)return;
  // white/orange screen flash
  if(ds.flashAlpha>0){cx.fillStyle='rgba(255,200,100,'+ds.flashAlpha.toFixed(3)+')';cx.fillRect(0,0,W,H);}
  // expanding rings
  ds.rings.forEach(function(ring){
    if(ring.alpha<=0||ds.frame<=ring.delay)return;
    cx.beginPath();cx.arc(ds.x,ds.y,ring.r,0,Math.PI*2);
    cx.strokeStyle=ring.color;cx.globalAlpha=ring.alpha;cx.lineWidth=ring.width*(1-ring.r/(ring.maxR||500));
    cx.stroke();
  });
  cx.globalAlpha=1;
  // debris particles
  ds.debris.forEach(function(d){
    var a=d.life/d.maxLife;

    bx.fillStyle=ng;bx.fillRect(0,0,W,H);
  });

  // Wispy nebula streaks (elongated ellipses)
  bx.save();
  for(var wi=0;wi<8;wi++){
    var wx=Math.random()*W,wy=Math.random()*H;
    var wa=Math.random()*Math.PI;
    bx.save();bx.translate(wx,wy);bx.rotate(wa);
    var wg=bx.createRadialGradient(0,0,0,0,0,W*0.2);
    var hue=Math.random()>.5?'40,80,160':'60,20,100';
    wg.addColorStop(0,'rgba('+hue+',.06)');
    wg.addColorStop(1,'rgba(0,0,0,0)');
    bx.fillStyle=wg;bx.scale(1,0.25);
    bx.fillRect(-W*0.2,-W*0.2,W*0.4,W*0.4);
    bx.restore();
  }
  bx.restore();

  // Background moon — large, softly lit
  var moonX=W*0.78,moonY=H*0.22,moonR=Math.min(W,H)*0.12;
  // Moon glow
  var glow=bx.createRadialGradient(moonX,moonY,moonR*0.8,moonX,moonY,moonR*2.5);
  glow.addColorStop(0,'rgba(100,130,180,.06)');
  glow.addColorStop(0.5,'rgba(60,80,140,.03)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  bx.fillStyle=glow;bx.fillRect(0,0,W,H);
  // Moon body
  var mg=bx.createRadialGradient(moonX-moonR*0.3,moonY-moonR*0.3,0,moonX,moonY,moonR);
  mg.addColorStop(0,'rgba(200,210,230,.18)');
  mg.addColorStop(0.7,'rgba(140,150,180,.12)');
  mg.addColorStop(1,'rgba(80,90,120,.06)');
  bx.fillStyle=mg;bx.beginPath();bx.arc(moonX,moonY,moonR,0,Math.PI*2);bx.fill();
  // Craters
  bx.globalAlpha=0.04;bx.fillStyle='#000';
  bx.beginPath();bx.arc(moonX+moonR*.2,moonY-moonR*.15,moonR*.2,0,Math.PI*2);bx.fill();
  bx.beginPath();bx.arc(moonX-moonR*.3,moonY+moonR*.3,moonR*.15,0,Math.PI*2);bx.fill();
  bx.beginPath();bx.arc(moonX+moonR*.1,moonY+moonR*.35,moonR*.12,0,Math.PI*2);bx.fill();
  bx.globalAlpha=1;

  // Distant planet — smaller, in the other corner
  var dpX=W*0.15,dpY=H*0.7,dpR=Math.min(W,H)*0.05;
  var dpg=bx.createRadialGradient(dpX-dpR*.3,dpY-dpR*.3,0,dpX,dpY,dpR);
  dpg.addColorStop(0,'rgba(120,80,60,.12)');
  dpg.addColorStop(1,'rgba(60,40,30,.06)');
  bx.fillStyle=dpg;bx.beginPath();bx.arc(dpX,dpY,dpR,0,Math.PI*2);bx.fill();
  // Ring
  bx.strokeStyle='rgba(160,140,110,.06)';bx.lineWidth=dpR*0.12;
  bx.beginPath();bx.ellipse(dpX,dpY,dpR*1.8,dpR*0.3,0.3,0,Math.PI*2);bx.stroke();

  // Tiny background star specks (static, part of bg)
  for(var si=0;si<200;si++){
    var sx=Math.random()*W,sy=Math.random()*H;
    var sb=0.1+Math.random()*0.4;
    var ss=0.3+Math.random()*1.0;
    bx.fillStyle='rgba(180,200,255,'+sb.toFixed(2)+')';
    bx.beginPath();bx.arc(sx,sy,ss,0,Math.PI*2);bx.fill();
  }

  // Edge vignette baked in
  var vig=bx.createRadialGradient(MX,MY,Math.min(W,H)*.25,MX,MY,Math.max(W,H)*.72);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.45)');
  bx.fillStyle=vig;bx.fillRect(0,0,W,H);
}

function draw(ts){
  cx.setTransform(1,0,0,1,0,0);cx.globalAlpha=1;

  // Pre-rendered atmospheric space background
  if(!bgCtx||bgCanvas.width!==W)renderSpaceBg();
  cx.drawImage(bgCanvas,0,0);

  // 3-layer parallax — each drawn to offscreen canvas, composited with blur + parallax shift
  var pdx=(P?P.x-MX:0)/MX, pdy=(P?P.y-MY:0)/MY;
  sxFar.clearRect(0,0,W,H);sxMid.clearRect(0,0,W,H);sxNear.clearRect(0,0,W,H);
  drawSpaceLayer(0,sxFar);drawSpaceLayer(1,sxMid);drawSpaceLayer(2,sxNear);
  cx.save();
  // Far: heavy blur, slow parallax shift (noticeable but gentle)
  cx.filter='blur(5px)';cx.globalAlpha=.7;cx.drawImage(scvFar,-pdx*15,-pdy*10);
  // Mid: medium blur, stronger parallax
  cx.filter='blur(2.5px)';cx.globalAlpha=.65;cx.drawImage(scvMid,-pdx*35,-pdy*25);
  // Near-ish: light blur, strongest parallax — most movement feel
  cx.filter='blur(1.2px)';cx.globalAlpha=.55;cx.drawImage(scvNear,-pdx*60,-pdy*40);
  cx.filter='none';cx.globalAlpha=1;cx.restore();

  var ox=0,oy=0;if(shake.life>0&&!over){var sa=shake.amt*(shake.life/8)*.4;ox=(Math.random()-.5)*sa*2;oy=(Math.random()-.5)*sa*2;}cx.translate(ox,oy);

  // powerups
  pups.forEach(function(pu){var pulse=.88+Math.sin(ts*.005)*.12;cx.beginPath();cx.arc(pu.x,pu.y,10*pulse,0,Math.PI*2);cx.fillStyle=pu.t.col+'33';cx.fill();cx.strokeStyle=pu.t.col;cx.lineWidth=1.5;cx.stroke();cx.fillStyle=pu.t.col;cx.font='11px monospace';cx.textAlign='center';cx.fillText(pu.t.glyph,pu.x,pu.y+4);});

  bullets.forEach(drawBolt);
  flashes.forEach(function(f){var fa=f.life/f.max;cx.fillStyle=f.col;cx.globalAlpha=fa;cx.beginPath();cx.arc(f.x,f.y,3*fa,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;

  // Boss glow
  if(isBoss&&!over&&gameStarted&&bossAnnounce<=0){var _bg=Date.now()/1000;cx.save();cx.globalAlpha=0.18+0.10*Math.sin(_bg*5);cx.strokeStyle='#ffaa00';cx.lineWidth=7;cx.beginPath();cx.arc(E.x,E.y,E.sz*1.9+14,0,Math.PI*2);cx.stroke();cx.globalAlpha=0.07+0.05*Math.sin(_bg*5+1.5);cx.lineWidth=16;cx.beginPath();cx.arc(E.x,E.y,E.sz*1.9+24,0,Math.PI*2);cx.stroke();cx.restore();}

  // HP rings
  [P,E].forEach(function(ent,i){var rcol=i===0?'#4fc3f7':'#ef5350',ratio=ent.hp/MAX_HP;cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+6,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);cx.strokeStyle=ratio>.35?rcol:'#ffb74d';cx.lineWidth=2.5;cx.stroke();if(ent.ef==='shield'){cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+12,0,Math.PI*2);cx.strokeStyle='rgba(186,104,200,.65)';cx.lineWidth=2;cx.stroke();}if(ent.ef==='auto'){cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+12,0,Math.PI*2);cx.strokeStyle='rgba(233,30,99,.55)';cx.lineWidth=2;cx.stroke();}var gmap={rapid:'\u26A1',auto:'\u221E',speed:'\u00BB',shield:'\u25C8'},cmap={rapid:'#f57c00',auto:'#e91e63',speed:'#388e3c',shield:'#7b1fa2'};if(ent.ef&&gmap[ent.ef]){cx.fillStyle=cmap[ent.ef];cx.font='bold 12px monospace';cx.textAlign='center';cx.fillText(gmap[ent.ef],ent.x,ent.y-ent.sz*2.2-14);}});

  drawCanadian(P.x,P.y,P.sz,cE);
  // Hide opponent during explosion, show otherwise
  if(!deathStarExplosion.active||deathStarExplosion.frame<8)drawTrump(E.x,E.y,E.sz,tE);
  // Death Star explosion effect — update here so it runs even when game is over
  if(deathStarExplosion.active)updateDeathStar();
  drawDeathStar();

  if(comboLabelTimer>0&&comboLabel){var _cf=comboLabelTimer/75;cx.save();cx.globalAlpha=Math.min(1,_cf*1.8);cx.font='bold '+(16+Math.round(8*_cf))+'px monospace';cx.textAlign='center';cx.fillStyle='#ffcc00';cx.shadowColor='#ff8800';cx.shadowBlur=14;cx.fillText(comboLabel,P.x,P.y-P.sz*2-22);cx.restore();}
  taunts.forEach(function(t){var alpha=Math.min(1,t.life/20),yOff=-E.sz*3-20-(1-t.life/130)*10;cx.globalAlpha=alpha;cx.font='bold 10px monospace';cx.textAlign='center';cx.textBaseline='middle';var tw2=cx.measureText(t.txt).width+18;cx.fillStyle='#fffde7';cx.beginPath();cx.arc(E.x-tw2/2+9,E.y+yOff,9,Math.PI*.5,Math.PI*1.5);cx.arc(E.x+tw2/2-9,E.y+yOff,9,Math.PI*1.5,Math.PI*.5);cx.closePath();cx.fill();cx.strokeStyle='#f9a825';cx.lineWidth=1;cx.stroke();cx.fillStyle='#333';cx.fillText(t.txt,E.x,E.y+yOff);cx.globalAlpha=1;cx.textBaseline='alphabetic';});

  if(drag){cx.strokeStyle='rgba(79,195,247,.3)';cx.lineWidth=1;cx.setLineDash([4,4]);cx.beginPath();cx.arc(P.x,P.y,P.sz*2.2+12,0,Math.PI*2);cx.stroke();cx.setLineDash([]);}
  if(!focused){cx.fillStyle='rgba(6,10,20,.6)';cx.fillRect(0,H-26,W,26);cx.fillStyle='rgba(79,195,247,.5)';cx.font='11px monospace';cx.textAlign='center';cx.fillText(isMobile?'tap to start \u2014 drag to move \u2014 auto-fires':'click here to enable keyboard controls',MX,H-9);}

  // === BOSS ANNOUNCEMENT OVERLAY ===
  if(bossAnnounce>0&&gameStarted){
    var baProg=1-bossAnnounce/180;
    // full black background
    cx.fillStyle='rgba(0,0,0,.92)';cx.fillRect(0,0,W,H);
    // pulsing warning border
    var pulseA=0.3+0.4*Math.abs(Math.sin(Date.now()/150));
    cx.strokeStyle='rgba(255,170,0,'+pulseA.toFixed(2)+')';cx.lineWidth=6;cx.strokeRect(8,8,W-16,H-16);
    // big text
    cx.textAlign='center';cx.textBaseline='middle';
    var bossFs=Math.min(48,W*.06);
    cx.save();
    cx.shadowColor='#ff6600';cx.shadowBlur=30;
    cx.fillStyle='#ffaa00';cx.font='bold '+bossFs+'px monospace';
    cx.fillText('\u26A0  BOSS ROUND  \u26A0',MX,MY-bossFs*.7);
    cx.shadowBlur=0;
    cx.fillStyle='rgba(255,255,255,.7)';cx.font=(bossFs*.45)+'px monospace';
    cx.fillText('Round '+round+' \u2014 Opponent is stronger & faster!',MX,MY+bossFs*.2);
    cx.fillStyle='rgba(255,255,255,.4)';cx.font=(bossFs*.32)+'px monospace';
    var skipTxt=isMobile?'tap to begin':'press any key to begin';
    if(baProg>0.3)cx.fillText(skipTxt,MX,MY+bossFs*1.0);
    // countdown dots
    var dotsLeft=Math.ceil(bossAnnounce/60);
    cx.fillStyle='#ffaa00';
    for(var di=0;di<dotsLeft;di++){cx.beginPath();cx.arc(MX-20+di*20,MY+bossFs*1.6,5,0,Math.PI*2);cx.fill();}
    cx.restore();
    cx.textBaseline='alphabetic';
  }

  // === GAME OVER OVERLAY (delayed during explosion) ===
  if(over&&(!deathStarExplosion.active||win!=='crowd')){
    cx.drawImage(bgCanvas,0,0);
    cx.fillStyle='rgba(2,4,8,.7)';cx.fillRect(0,0,W,H);
    // subtle radial glow
    var winCol=win==='crowd'?'rgba(79,195,247,.08)':'rgba(239,83,80,.08)';
    var rg=cx.createRadialGradient(MX,MY,0,MX,MY,Math.min(W,H)*.5);
    rg.addColorStop(0,winCol);rg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=rg;cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    var endFs=Math.min(28,W*.035);
    cx.fillStyle=win==='crowd'?'#4fc3f7':'#ef5350';cx.font='bold '+endFs+'px monospace';
    cx.fillText(win==='crowd'?'CROWD WINS!':'OPPONENT WINS!',MX,MY-endFs*1.2);
    cx.fillStyle='rgba(255,255,255,.5)';cx.font=(endFs*.6)+'px monospace';
    cx.fillText('score  '+pScore+' \u2014 '+eScore,MX,MY);
    cx.fillStyle='rgba(255,255,255,.25)';cx.font=(endFs*.45)+'px monospace';
    cx.fillText('next round starting\u2026  (round '+(round+1)+')',MX,MY+endFs*.9);
    // taunts hidden on game over — solid bg covers them
  }

  if(paused&&!over&&bossAnnounce<=0){cx.fillStyle='rgba(4,8,16,.6)';cx.fillRect(0,0,W,H);cx.fillStyle='#4fc3f7';cx.font='bold 24px monospace';cx.textAlign='center';cx.fillText('PAUSED',MX,MY-8);cx.fillStyle='rgba(255,255,255,.35)';cx.font='11px monospace';cx.fillText(isMobile?'tap pause to resume':'press P or ESC to resume',MX,MY+14);}
  cx.setTransform(1,0,0,1,0,0);

  // === START SCREEN — atmospheric bg ===
  if(!gameStarted){
    if(!bgCtx||bgCanvas.width!==W)renderSpaceBg();
    cx.drawImage(bgCanvas,0,0);
    // Dim overlay for readability
    cx.fillStyle='rgba(2,4,8,.55)';cx.fillRect(0,0,W,H);
    // subtle parallax layers on start screen
    sxFar.clearRect(0,0,W,H);sxMid.clearRect(0,0,W,H);
    drawSpaceLayer(0,sxFar);drawSpaceLayer(1,sxMid);
    cx.save();cx.filter='blur(4px)';cx.globalAlpha=.3;cx.drawImage(scvFar,0,0);
    cx.filter='blur(2px)';cx.globalAlpha=.25;cx.drawImage(scvMid,0,0);
    cx.filter='none';cx.globalAlpha=1;cx.restore();
    cx.textAlign='center';cx.textBaseline='middle';
    var tFs=Math.min(30,W*.04);
    cx.fillStyle='#4fc3f7';cx.font='bold '+tFs+'px monospace';
    cx.fillText('CROWD  vs  OPPONENT',MX,MY-tFs*3.5);
    cx.strokeStyle='rgba(79,195,247,.35)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(MX-170,MY-tFs*2.6);cx.lineTo(MX+170,MY-tFs*2.6);cx.stroke();
    cx.fillStyle='rgba(255,255,255,.78)';cx.font=(tFs*.5)+'px monospace';
    if(isMobile){
      cx.fillText('DRAG to move  \u00B7  auto-fires while touching',MX,MY-tFs*1.5);
    } else {
      cx.fillText('\u2190\u2191\u2193\u2192  or  DRAG  to move',MX,MY-tFs*1.8);
      cx.fillText('SPACE  to fire  \u00B7  hold = auto-fire',MX,MY-tFs*1.0);
    }
    cx.fillStyle='rgba(255,255,255,.52)';cx.font=(tFs*.42)+'px monospace';
    cx.fillText('shoot the opponent \u2022 dodge red bolts \u2022 grab power-ups',MX,MY-tFs*.15);
    cx.fillText('\u26A1 rapid  \u00B7  \u221E auto  \u00B7  \u00BB speed  \u00B7  \u25C8 shield  \u00B7  \u2665 heal',MX,MY+tFs*.55);
    var ctaLabel=isMobile?'\u25BA  TAP TO BEGIN':'\u25BA  CLICK TO BEGIN';
    cx.font='bold '+(tFs*.55)+'px monospace';
    var ctaW=cx.measureText(ctaLabel).width+48;
    var ctaX=MX-ctaW/2,ctaY=MY+tFs*1.5,ctaH=tFs*1.4;
    // pulsing CTA
    var ctaPulse=0.85+0.15*Math.sin(Date.now()/300);
    cx.globalAlpha=ctaPulse;
    cx.fillStyle='#4fc3f7';
    cx.beginPath();cx.moveTo(ctaX+8,ctaY);cx.lineTo(ctaX+ctaW-8,ctaY);cx.arc(ctaX+ctaW-8,ctaY+8,8,-Math.PI/2,0);cx.lineTo(ctaX+ctaW,ctaY+ctaH-8);cx.arc(ctaX+ctaW-8,ctaY+ctaH-8,8,0,Math.PI/2);cx.lineTo(ctaX+8,ctaY+ctaH);cx.arc(ctaX+8,ctaY+ctaH-8,8,Math.PI/2,Math.PI);cx.lineTo(ctaX,ctaY+8);cx.arc(ctaX+8,ctaY+8,8,Math.PI,-Math.PI/2);cx.closePath();cx.fill();
    cx.globalAlpha=1;
    cx.fillStyle='#020408';cx.font='bold '+(tFs*.5)+'px monospace';cx.fillText(ctaLabel,MX,ctaY+ctaH/2);
    cx.textBaseline='alphabetic';
  }
}

function loop(ts){try{if(gameStarted)update(ts);draw(ts);}catch(err){console.error('loop error:',err);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
