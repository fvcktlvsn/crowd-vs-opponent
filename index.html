<!DOCTYPE html>
<html lang="en">
<head>

<style>

</style>
</head>
<body>
<div id="wrap">

    <span>opponent hp: <b id="ehp">800</b></span>
  </div>
  <canvas id="g" style="display:block;cursor:crosshair;border-radius:8px;width:100%;height:auto;"></canvas>
  <div id="msg">click arena to start &middot; arrows move &middot; space fires</div>
  <div class="btns">
    <button id="bu">&uarr;</button><button id="bl">&larr;</button>

</div>
<script>
(function(){
var cv=document.getElementById('g'),cx=cv.getContext('2d');
var W=600,H=372;
cv.width=W;cv.height=H;

// offscreen canvas for blurred starfield

var sx=scv.getContext('2d');

// starfield
var stars=[];
for(var si=0;si<160;si++){var depth=Math.random();stars.push({x:Math.random()*W,y:Math.random()*H,sz:.3+depth*1.2,sp:2+depth*6,streak:4+depth*18,br:.15+depth*.7,tw:Math.random()*Math.PI*2,ang:Math.PI/2});}

function oval(ox,oy,rx,ry){var k=.552;cx.beginPath();cx.moveTo(ox,oy-ry);cx.bezierCurveTo(ox+rx*k,oy-ry,ox+rx,oy-ry*k,ox+rx,oy);cx.bezierCurveTo(ox+rx,oy+ry*k,ox+rx*k,oy+ry,ox,oy+ry);cx.bezierCurveTo(ox-rx*k,oy+ry,ox-rx,oy+ry*k,ox-rx,oy);cx.bezierCurveTo(ox-rx,oy-ry*k,ox-rx*k,oy-ry,ox,oy-ry);cx.closePath();}
function rrect(x,y,w,h,r){r=Math.min(r,w/2,h/2);cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arc(x+w-r,y+r,r,-Math.PI/2,0);cx.lineTo(x+w,y+h-r);cx.arc(x+w-r,y+h-r,r,0,Math.PI/2);cx.lineTo(x+r,y+h);cx.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);cx.lineTo(x,y+r);cx.arc(x+r,y+r,r,Math.PI,-Math.PI/2);cx.closePath();}

// audio
var actx=null;
function ac(){
  if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();}
  if(actx.state==='suspended'){actx.resume();}

}
function sndShoot(){try{var a=ac(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(1800,t);o.frequency.exponentialRampToValueAtTime(300,t+.12);g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.15);var o2=a.createOscillator(),g2=a.createGain();o2.type='sawtooth';o2.frequency.setValueAtTime(3200,t);o2.frequency.exponentialRampToValueAtTime(200,t+.04);g2.gain.setValueAtTime(.06,t);g2.gain.exponentialRampToValueAtTime(.001,t+.05);o2.connect(g2);g2.connect(a.destination);o2.start(t);o2.stop(t+.06);}catch(e){}}
function sndHit(){try{var a=ac(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(60,t+.15);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.2);var o2=a.createOscillator(),g2=a.createGain();o2.type='sine';o2.frequency.setValueAtTime(120,t);o2.frequency.exponentialRampToValueAtTime(40,t+.1);g2.gain.setValueAtTime(.15,t);g2.gain.exponentialRampToValueAtTime(.001,t+.12);o2.connect(g2);g2.connect(a.destination);o2.start(t);o2.stop(t+.13);}catch(e){}}
function sndPow(){try{var a=ac(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+.08);o.frequency.exponentialRampToValueAtTime(800,t+.15);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.2);}catch(e){}}
function sndWin(){try{var a=ac(),t=a.currentTime;[440,554,659,880].forEach(function(f,i){var o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.1,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.2);o.connect(g);g.connect(a.destination);o.start(t+i*.08);o.stop(t+i*.08+.22);});}catch(e){}}
function sndLose(){try{var a=ac(),t=a.currentTime;[330,220,165,110].forEach(function(f,i){var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.1,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.25);o.connect(g);g.connect(a.destination);o.start(t+i*.1);o.stop(t+i*.1+.27);});}catch(e){}}

var tE='normal',tT=0,cE='normal',cT=0,jaw=0,armT=0;
function setT(e,d){tE=e;tT=d||90;}
function setC(e,d){cE=e;cT=d||90;}

// Canadian character
function drawCanadian(x,y,sz,expr){var s=sz*1.6;cx.save();cx.translate(x,y);cx.fillStyle='#555';cx.fillRect(-s*.32,s*1.05,s*.22,s*.45);cx.fillRect(s*.1,s*1.05,s*.22,s*.45);cx.fillStyle='#222';cx.fillRect(-s*.35,s*1.42,s*.28,s*.12);cx.fillRect(s*.08,s*1.42,s*.28,s*.12);cx.fillStyle='#e02020';cx.fillRect(-s*.42,s*.3,s*.84,s*.8);cx.strokeStyle='#b01818';cx.lineWidth=1.5;cx.strokeRect(-s*.42,s*.3,s*.84,s*.8);var armAng=expr==='fire'?-.4+Math.sin(armT*2)*.3:Math.sin(armT*.5)*.08;[-1,1].forEach(function(side){cx.save();cx.translate(side*s*.42,s*.45);cx.rotate(side*(.25+armAng));cx.fillStyle='#e02020';cx.fillRect(0,-s*.06,side*s*.38,s*.12);cx.fillStyle='#f5c5a0';cx.beginPath();cx.arc(side*s*.4,0,s*.08,0,Math.PI*2);cx.fill();cx.restore();});var headW=s*.82,headH=s*.7;var jawOpen=expr==='fire'?Math.abs(Math.sin(jaw))*s*.35+s*.06:expr==='hit'?s*.28:expr==='panic'?Math.abs(Math.sin(jaw*1.8))*s*.22+s*.08:s*.03+Math.abs(Math.sin(jaw*.3))*s*.02;cx.fillStyle='#f5c5a0';cx.beginPath();cx.moveTo(-headW*.5,s*.08);cx.lineTo(-headW*.5,-headH*.7);cx.quadraticCurveTo(-headW*.5,-headH*1.0,-headW*.15,-headH*1.0);cx.lineTo(headW*.15,-headH*1.0);cx.quadraticCurveTo(headW*.5,-headH*1.0,headW*.5,-headH*.7);cx.lineTo(headW*.5,s*.08);cx.closePath();cx.fill();cx.strokeStyle='#c49070';cx.lineWidth=1.5;cx.stroke();cx.fillStyle='#1a1a1a';cx.beginPath();cx.moveTo(-headW*.5,-headH*.7);cx.quadraticCurveTo(-headW*.5,-headH*1.05,-headW*.15,-headH*1.05);cx.lineTo(headW*.15,-headH*1.05);cx.quadraticCurveTo(headW*.5,-headH*1.05,headW*.5,-headH*.7);cx.lineTo(headW*.5,-headH*.6);cx.quadraticCurveTo(0,-headH*.5,-headW*.5,-headH*.6);cx.closePath();cx.fill();var eyY=-headH*.28;[-1,1].forEach(function(side){cx.fillStyle='#111';cx.beginPath();cx.arc(side*s*.18,eyY,s*.08,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.beginPath();cx.arc(side*s*.18+s*.025,eyY-s*.025,s*.025,0,Math.PI*2);cx.fill();});cx.strokeStyle='#1a1a1a';cx.lineWidth=s*.06;cx.lineCap='round';var bY=eyY-s*.16;if(expr==='hit'||expr==='panic'){cx.beginPath();cx.moveTo(-s*.28,bY-s*.04);cx.lineTo(-s*.08,bY+s*.06);cx.stroke();cx.beginPath();cx.moveTo(s*.28,bY-s*.04);cx.lineTo(s*.08,bY+s*.06);cx.stroke();}else{cx.beginPath();cx.moveTo(-s*.28,bY);cx.lineTo(-s*.08,bY);cx.stroke();cx.beginPath();cx.moveTo(s*.08,bY);cx.lineTo(s*.28,bY);cx.stroke();}cx.strokeStyle='#c49070';cx.lineWidth=2;cx.beginPath();cx.moveTo(-headW*.48,s*.08);cx.lineTo(headW*.48,s*.08);cx.stroke();cx.save();cx.translate(0,s*.08+jawOpen);cx.fillStyle='#f5c5a0';cx.beginPath();cx.moveTo(-headW*.5,0);cx.lineTo(-headW*.5,s*.28);cx.quadraticCurveTo(-headW*.5,s*.45,-headW*.15,s*.45);cx.lineTo(headW*.15,s*.45);cx.quadraticCurveTo(headW*.5,s*.45,headW*.5,s*.28);cx.lineTo(headW*.5,0);cx.closePath();cx.fill();cx.strokeStyle='#c49070';cx.lineWidth=1.5;cx.stroke();if(jawOpen>s*.08){cx.fillStyle='#fff';cx.fillRect(-headW*.35,-s*.02,headW*.7,s*.1);cx.strokeStyle='#ddd';cx.lineWidth=.8;for(var ti=-2;ti<=2;ti++){cx.beginPath();cx.moveTo(ti*s*.1,-s*.02);cx.lineTo(ti*s*.1,s*.08);cx.stroke();}}cx.restore();cx.restore();}

// Opponent character
function drawTrump(x,y,sz,expr){var s=sz*1.6;cx.save();cx.translate(x,y);cx.fillStyle='#222';cx.fillRect(-s*.3,s*1.05,s*.2,s*.45);cx.fillRect(s*.1,s*1.05,s*.2,s*.45);cx.fillStyle='#111';cx.fillRect(-s*.33,s*1.42,s*.26,s*.12);cx.fillRect(s*.08,s*1.42,s*.26,s*.12);cx.fillStyle='#1a3a6b';cx.fillRect(-s*.45,s*.2,s*.9,s*.9);cx.strokeStyle='#0f2448';cx.lineWidth=1.5;cx.strokeRect(-s*.45,s*.2,s*.9,s*.9);cx.fillStyle='#f0f0f0';cx.beginPath();cx.moveTo(-s*.15,s*.2);cx.lineTo(0,s*.65);cx.lineTo(s*.15,s*.2);cx.closePath();cx.fill();cx.fillStyle='#cc0000';cx.beginPath();cx.moveTo(-s*.07,s*.28);cx.lineTo(s*.07,s*.28);cx.lineTo(s*.09,s*1.0);cx.lineTo(0,s*1.1);cx.lineTo(-s*.09,s*1.0);cx.closePath();cx.fill();cx.fillStyle='#f0c020';cx.beginPath();cx.arc(-s*.28,s*.42,s*.04,0,Math.PI*2);cx.fill();var armAng=(expr==='hit'||expr==='pissed')?Math.sin(armT*3)*.25:Math.sin(armT*.4)*.06;[-1,1].forEach(function(side){cx.save();cx.translate(side*s*.45,s*.35);cx.rotate(side*(.2+armAng));cx.fillStyle='#1a3a6b';cx.fillRect(0,-s*.06,side*s*.4,s*.12);cx.fillStyle='#e8956a';cx.beginPath();cx.arc(side*s*.42,0,s*.065,0,Math.PI*2);cx.fill();cx.restore();});var headW=s*.9,headH=s*.85,headY=-s*.35;cx.fillStyle='#e8a06a';rrect(-headW*.5,headY-headH*.5,headW,headH,s*.12);cx.fill();cx.strokeStyle='#c07040';cx.lineWidth=1.5;rrect(-headW*.5,headY-headH*.5,headW,headH,s*.12);cx.stroke();cx.globalAlpha=.15;cx.fillStyle='#ff6050';cx.beginPath();cx.arc(-s*.28,headY+s*.08,s*.1,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(s*.28,headY+s*.08,s*.1,0,Math.PI*2);cx.fill();cx.globalAlpha=1;var eyY=headY-s*.06,eyX=s*.2;if(expr==='hit'||expr==='pissed'){[-eyX,eyX].forEach(function(ex2){cx.fillStyle='#fff';oval(ex2,eyY,s*.1,s*.05);cx.fill();cx.fillStyle='#111';cx.beginPath();cx.arc(ex2,eyY,s*.04,0,Math.PI*2);cx.fill();});}else if(expr==='panic'){[-eyX,eyX].forEach(function(ex2){cx.fillStyle='#fff';oval(ex2,eyY,s*.12,s*.12);cx.fill();cx.fillStyle='#2255aa';cx.beginPath();cx.arc(ex2,eyY+s*.01,s*.06,0,Math.PI*2);cx.fill();cx.fillStyle='#111';cx.beginPath();cx.arc(ex2,eyY+s*.01,s*.035,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.beginPath();cx.arc(ex2+s*.03,eyY-s*.03,s*.02,0,Math.PI*2);cx.fill();});}else if(expr==='smug'){[-eyX,eyX].forEach(function(ex2){cx.fillStyle='#fff';oval(ex2,eyY,s*.1,s*.055);cx.fill();cx.fillStyle='#2255aa';oval(ex2,eyY+s*.01,s*.06,s*.04);cx.fill();cx.fillStyle='#111';cx.beginPath();cx.arc(ex2,eyY+s*.01,s*.03,0,Math.PI*2);cx.fill();});}else{[-eyX,eyX].forEach(function(ex2){cx.fillStyle='#fff';oval(ex2,eyY,s*.1,s*.08);cx.fill();cx.fillStyle='#2255aa';cx.beginPath();cx.arc(ex2,eyY,s*.055,0,Math.PI*2);cx.fill();cx.fillStyle='#111';cx.beginPath();cx.arc(ex2,eyY,s*.035,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.beginPath();cx.arc(ex2+s*.025,eyY-s*.025,s*.015,0,Math.PI*2);cx.fill();});}cx.lineWidth=s*.065;cx.lineCap='round';var bYt=eyY-s*.14;if(expr==='hit'||expr==='pissed'){cx.strokeStyle='#3a1000';cx.beginPath();cx.moveTo(-eyX-s*.12,bYt-s*.08);cx.lineTo(-eyX+s*.12,bYt+s*.1);cx.stroke();cx.beginPath();cx.moveTo(eyX+s*.12,bYt-s*.08);cx.lineTo(eyX-s*.12,bYt+s*.1);cx.stroke();}else if(expr==='panic'){cx.strokeStyle='#5a2a00';cx.beginPath();cx.moveTo(-eyX-s*.12,bYt+s*.08);cx.lineTo(-eyX+s*.12,bYt-s*.06);cx.stroke();cx.beginPath();cx.moveTo(eyX+s*.12,bYt+s*.08);cx.lineTo(eyX-s*.12,bYt-s*.06);cx.stroke();}else if(expr==='smug'){cx.strokeStyle='#7a4020';cx.beginPath();cx.moveTo(-eyX-s*.12,bYt+s*.02);cx.quadraticCurveTo(-eyX,bYt-s*.04,-eyX+s*.12,bYt+s*.01);cx.stroke();cx.beginPath();cx.moveTo(eyX-s*.12,bYt+s*.01);cx.quadraticCurveTo(eyX,bYt-s*.04,eyX+s*.12,bYt+s*.02);cx.stroke();}else{cx.strokeStyle='#7a4020';cx.beginPath();cx.moveTo(-eyX-s*.12,bYt);cx.lineTo(-eyX+s*.12,bYt);cx.stroke();cx.beginPath();cx.moveTo(eyX-s*.12,bYt);cx.lineTo(eyX+s*.12,bYt);cx.stroke();}cx.fillStyle='#d4784a';oval(0,headY+s*.08,s*.1,s*.09);cx.fill();var mY=headY+s*.22;if(expr==='hit'||expr==='pissed'){cx.fillStyle='#3a0a00';oval(0,mY,s*.22,s*.14);cx.fill();cx.fillStyle='#fff';cx.fillRect(-s*.18,mY-s*.06,s*.36,s*.07);cx.strokeStyle='#ddd';cx.lineWidth=.6;for(var mi=-2;mi<=2;mi++){cx.beginPath();cx.moveTo(mi*s*.07,mY-s*.06);cx.lineTo(mi*s*.07,mY+s*.01);cx.stroke();}cx.strokeStyle='#7a3010';cx.lineWidth=s*.04;oval(0,mY,s*.22,s*.14);cx.stroke();}else if(expr==='panic'){cx.fillStyle='#3a0a00';oval(0,mY,s*.18,s*.16);cx.fill();cx.fillStyle='#eee';cx.fillRect(-s*.14,mY-s*.07,s*.28,s*.07);cx.strokeStyle='#7a3010';cx.lineWidth=s*.04;oval(0,mY,s*.18,s*.16);cx.stroke();}else if(expr==='smug'){cx.strokeStyle='#7a3010';cx.lineWidth=s*.05;cx.lineCap='round';cx.beginPath();cx.moveTo(-s*.16,mY);cx.quadraticCurveTo(0,mY+s*.1,s*.2,mY-s*.04);cx.stroke();}else{cx.fillStyle='#c06040';cx.beginPath();cx.moveTo(-s*.16,mY);cx.quadraticCurveTo(0,mY-s*.04,s*.16,mY);cx.quadraticCurveTo(0,mY+s*.06,-s*.16,mY);cx.closePath();cx.fill();cx.strokeStyle='#8a4020';cx.lineWidth=s*.03;cx.stroke();}cx.fillStyle='#e8c020';cx.beginPath();cx.moveTo(headW*.5,headY-headH*.28);cx.quadraticCurveTo(headW*.4,headY-headH*.72,-headW*.05,headY-headH*.68);cx.quadraticCurveTo(-headW*.5,headY-headH*.58,-headW*.5,headY-headH*.3);cx.quadraticCurveTo(-headW*.35,headY-headH*.45,-headW*.05,headY-headH*.48);cx.quadraticCurveTo(headW*.3,headY-headH*.42,headW*.5,headY-headH*.28);cx.closePath();cx.fill();cx.strokeStyle='#c09010';cx.lineWidth=.7;for(var hi=0;hi<4;hi++){var ht=hi/3;cx.beginPath();cx.moveTo(headW*(.42-ht*.7),headY-headH*(.3+ht*.02));cx.quadraticCurveTo(headW*(.1-ht*.4),headY-headH*.62,headW*(-.1-ht*.15),headY-headH*(.5+ht*.06));cx.stroke();}cx.restore();}

// state
function mkE(px,py){return{x:px,y:py,vx:0,vy:0,ang:0,hp:MAX_HP,sz:MAX_SZ,ef:null,eft:0};}
var round=1,pScore=0,eScore=0,P,E,bullets,pups,pFire,eFire,puT,over,win,flashes,taunts,lastTaunt=0;
var shake={life:0,amt:0};
var TH=['WRONG!','SAD!','NOT FAIR!','FAKE NEWS!','RIGGED!','TOTAL DISASTER!'];
var TD=['YOU MISSED!','NOBODY DODGES BETTER!','TREMENDOUS!'];
var TL=['SEND HELP!','DEEP STATE!!','THIS IS RIGGED!'];
var PUTYPES=[{id:'rapid',col:'#f57c00',glyph:'\u26A1'},{id:'auto',col:'#e91e63',glyph:'\u221E'},{id:'speed',col:'#388e3c',glyph:'\u00BB'},{id:'shield',col:'#7b1fa2',glyph:'\u25C8'},{id:'heal',col:'#c62828',glyph:'\u2665'}];
function init(){P=mkE(W*.2,MY);E=mkE(W*.8,MY);bullets=[];pups=[];flashes=[];taunts=[];pFire=-9999;eFire=-9999;puT=[900,4200,7800,11500];over=false;win=null;tE='normal';cE='normal';document.getElementById('php').textContent=MAX_HP;document.getElementById('ehp').textContent=MAX_HP;}
init();
function spawnPU(ts){if(pups.length>=4)return;var t=PUTYPES[Math.floor(Math.random()*PUTYPES.length)];pups.push({x:PAD+30+Math.random()*(W-PAD*2-60),y:PAD+30+Math.random()*(H-PAD*2-60),t:t,born:ts});}
function addTaunt(txt){taunts.push({txt:txt,life:130});}

// input
var held={},focused=false,spaceQ=false,spaceHeld=false,drag=false,dox=0,doy=0;
cv.setAttribute('tabindex','0');
cv.addEventListener('focus',function(){focused=true;cv.style.outline='2px solid #4fc3f7';document.getElementById('msg').textContent='arrows move \u00B7 space fires \u00B7 hold space = auto \u00B7 drag to reposition';});
cv.addEventListener('blur',function(){focused=false;cv.style.outline='none';Object.keys(held).forEach(function(k){delete held[k];});spaceHeld=false;document.getElementById('msg').textContent='click arena to start \u00B7 arrows move \u00B7 space fires';});
cv.addEventListener('keydown',function(e){if(e.key===' '){e.preventDefault();spaceQ=true;spaceHeld=true;return;}var m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r'};if(m[e.key]){e.preventDefault();held[m[e.key]]=true;}});
cv.addEventListener('keyup',function(e){if(e.key===' '){spaceHeld=false;return;}var m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r'};if(m[e.key])delete held[m[e.key]];});
function cXY(e){var r=cv.getBoundingClientRect(),scx=W/r.width,scy=H/r.height;return[(e.clientX-r.left)*scx,(e.clientY-r.top)*scy];}
cv.addEventListener('mousedown',function(e){cv.focus();var p=cXY(e);if(Math.hypot(p[0]-P.x,p[1]-P.y)<P.sz*1.6+28){drag=true;dox=p[0]-P.x;doy=p[1]-P.y;}});
cv.addEventListener('mousemove',function(e){if(!drag||over)return;var p=cXY(e),nx=p[0]-dox,ny=p[1]-doy;P.vx=(nx-P.x)*.4;P.vy=(ny-P.y)*.4;P.ang=Math.atan2(ny-P.y,nx-P.x);P.x=nx;P.y=ny;wc(P);});
window.addEventListener('mouseup',function(){drag=false;});
cv.addEventListener('touchstart',function(e){e.preventDefault();cv.focus();var t=e.touches[0],p=cXY(t);if(Math.hypot(p[0]-P.x,p[1]-P.y)<P.sz*1.6+34){drag=true;dox=p[0]-P.x;doy=p[1]-P.y;}},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();if(!drag||over)return;var t=e.touches[0],p=cXY(t),nx=p[0]-dox,ny=p[1]-doy;P.vx=(nx-P.x)*.4;P.vy=(ny-P.y)*.4;P.x=nx;P.y=ny;wc(P);},{passive:false});
cv.addEventListener('touchend',function(){drag=false;});
function holdBtn(id,fn){var b=document.getElementById(id);if(!b)return;var iv=null;b.addEventListener('mousedown',function(e){e.preventDefault();fn();iv=setInterval(fn,65);});b.addEventListener('touchstart',function(e){e.preventDefault();fn();iv=setInterval(fn,65);},{passive:false});['mouseup','mouseleave','touchend','touchcancel'].forEach(function(ev){b.addEventListener(ev,function(){clearInterval(iv);});});}
holdBtn('bu',function(){mv(0,-1);});holdBtn('bd',function(){mv(0,1);});holdBtn('bl',function(){mv(-1,0);});holdBtn('br',function(){mv(1,0);});
document.getElementById('bfire').addEventListener('mousedown',function(){spaceQ=true;spaceHeld=true;});
['mouseup','mouseleave','touchend'].forEach(function(ev){document.getElementById('bfire').addEventListener(ev,function(){spaceHeld=false;});});

// physics — rectangular arena
function wc(e){
  var m=e.sz*1.6+PAD;
  if(e.x<m){e.x=m;if(e.vx<0)e.vx*=-.6;}
  if(e.x>W-m){e.x=W-m;if(e.vx>0)e.vx*=-.6;}
  if(e.y<m){e.y=m;if(e.vy<0)e.vy*=-.6;}
  if(e.y>H-m){e.y=H-m;if(e.vy>0)e.vy*=-.6;}
}
function mv(dx,dy){if(over||drag)return;var m=Math.hypot(dx,dy)||1,boost=P.ef==='speed'?1.8:1;P.vx+=dx/m*ACCEL*boost;P.vy+=dy/m*ACCEL*boost;if(dx||dy)P.ang=Math.atan2(dy,dx);}
function fcd(e){return e.ef==='auto'?55:e.ef==='rapid'?100:165;}
function shoot(from,tx,ty,own){var a=Math.atan2(ty-from.y,tx-from.x);bullets.push({x:from.x+Math.cos(a)*(from.sz*1.6+26),y:from.y+Math.sin(a)*(from.sz*1.6+26),vx:Math.cos(a)*7.5,vy:Math.sin(a)*7.5,ang:a,owner:own,bounces:1,life:200});if(own==='p'){sndShoot();setC('fire',22);}}
function spawnFlash(x,y,col){for(var i=0;i<8;i++){var a=Math.random()*Math.PI*2,s=1.5+Math.random()*3.5;flashes.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:col,life:18,max:18});}}
function shake2(amt){if(!over){shake.life=8;shake.amt=amt;}}
function dodgeVec(e){var fx=0,fy=0;for(var i=0;i<bullets.length;i++){var b=bullets[i];if(b.owner===e.owner)continue;var dx=e.x-b.x,dy=e.y-b.y,dist=Math.hypot(dx,dy);if(dist>DODGE_R)continue;var bl=Math.hypot(b.vx,b.vy),bnx=b.vx/bl,bny=b.vy/bl,dot=dx*bnx+dy*bny;if(dot<-10)continue;var px=dx-dot*bnx,py=dy-dot*bny,threat=Math.max(0,1-(Math.hypot(px,py)/(e.sz*1.6+20)));if(threat<.01)continue;var side=(px*(-bny)+py*bnx)>=0?1:-1;fx+=-bny*side*threat*(1-dist/DODGE_R);fy+=bnx*side*threat*(1-dist/DODGE_R);}return{fx:fx,fy:fy};}

// update
function update(ts){if(over)return;jaw+=.26;armT+=.08;var dx=0,dy=0;if(held.u)dy-=1;if(held.d)dy+=1;if(held.l)dx-=1;if(held.r)dx+=1;if(!drag&&(dx||dy))mv(dx,dy);if(!drag){P.vx*=FRICTION;P.vy*=FRICTION;P.x+=P.vx;P.y+=P.vy;wc(P);}if(spaceQ){spaceQ=false;if(ts-pFire>=fcd(P)){pFire=ts;shoot(P,E.x,E.y,'p');}}if(spaceHeld&&(P.ef==='auto'||P.ef==='rapid')&&ts-pFire>=fcd(P)){pFire=ts;shoot(P,E.x,E.y,'p');}P.sz=Math.min(MAX_SZ,P.sz+.012);E.sz=Math.min(MAX_SZ,E.sz+.012);if(P.ef&&ts>P.eft)P.ef=null;if(E.ef&&ts>E.eft)E.ef=null;if(tT>0){tT--;if(tT===0)tE=E.hp<MAX_HP*.35?'panic':'normal';}if(cT>0){cT--;if(cT===0)cE=P.hp<MAX_HP*.35?'panic':'normal';}if(tE==='normal'&&P.hp<MAX_HP*.4&&E.hp>MAX_HP*.55)setT('smug',55);for(var i=0;i<puT.length;i++){if(ts>puT[i]){spawnPU(ts);puT[i]=ts+4200;}}pups=pups.filter(function(pu){if(ts-pu.born>16000)return false;var ph=Math.hypot(pu.x-P.x,pu.y-P.y)<P.sz*1.6+14,eh=Math.hypot(pu.x-E.x,pu.y-E.y)<E.sz*1.6+14;if(ph||eh){var tgt=ph?P:E;sndPow();if(pu.t.id==='heal')tgt.hp=Math.min(MAX_HP,tgt.hp+120);else{tgt.ef=pu.t.id;tgt.eft=ts+6000;}return false;}return true;});var ecd=Math.max(420,950-(round-1)*60),eAcc=(.38+(round-1)*.022)*(E.ef==='speed'?1.8:1);var exd=P.x-E.x,eyd=P.y-E.y,ed=Math.hypot(exd,eyd);E.ang=Math.atan2(eyd,exd);var dv=dodgeVec(E),ds=Math.hypot(dv.fx,dv.fy),emx=0,emy=0;if(ds>.05){emx=dv.fx/ds;emy=dv.fy/ds;if(ts-lastTaunt>3500&&Math.random()<.18){addTaunt(TD[Math.floor(Math.random()*TD.length)]);lastTaunt=ts;setT('smug',80);}}else{var pref=W*.22;if(ed>pref+25){emx+=exd/ed;emy+=eyd/ed;}else if(ed<pref-25){emx-=exd/ed;emy-=eyd/ed;}var orb=Math.atan2(eyd,exd)+Math.PI/2;emx+=Math.cos(orb)*.55;emy+=Math.sin(orb)*.55;if(E.hp<MAX_HP*.5){if(ts-lastTaunt>4000&&Math.random()<.15){addTaunt(TL[Math.floor(Math.random()*TL.length)]);lastTaunt=ts;}var heals=pups.filter(function(p){return p.t.id==='heal';});if(heals.length){var hh=heals[0],hd=Math.hypot(hh.x-E.x,hh.y-E.y);emx+=(hh.x-E.x)/hd*.9;emy+=(hh.y-E.y)/hd*.9;}}else if(round>=2&&pups.length){var pu2=pups[0],pd=Math.hypot(pu2.x-E.x,pu2.y-E.y);if(pd<W*.35){emx+=(pu2.x-E.x)/pd*.3;emy+=(pu2.y-E.y)/pd*.3;}}}
// keep enemy away from walls
var wPull=.8;if(E.x<W*.15)emx+=wPull;if(E.x>W*.85)emx-=wPull;if(E.y<H*.15)emy+=wPull;if(E.y>H*.85)emy-=wPull;
var em=Math.hypot(emx,emy)||1;E.vx+=emx/em*eAcc;E.vy+=emy/em*eAcc;E.vx*=.84;E.vy*=.84;E.x+=E.vx;E.y+=E.vy;wc(E);
if(ts-eFire>ecd){eFire=ts;var lead=Math.min(round-1,5)*.07,etx=P.x+Math.cos(P.ang)*Math.hypot(P.vx,P.vy)*lead*14,ety=P.y+Math.sin(P.ang)*Math.hypot(P.vx,P.vy)*lead*14,efx=round>=3?etx:P.x,efy=round>=3?ety:P.y,ba=Math.atan2(efy-E.y,efx-E.x);bullets.push({x:E.x+Math.cos(ba)*(E.sz*1.6+26),y:E.y+Math.sin(ba)*(E.sz*1.6+26),vx:Math.cos(ba)*7.5,vy:Math.sin(ba)*7.5,ang:ba,owner:'e',bounces:1,life:200});}
// bullet collision — rectangular walls
bullets=bullets.filter(function(b){b.x+=b.vx;b.y+=b.vy;b.life--;
if(b.x<=2||b.x>=W-2){if(b.bounces>0){b.vx*=-1;b.x=b.x<=2?3:W-3;b.ang=Math.atan2(b.vy,b.vx);b.bounces--;}else return false;}
if(b.y<=2||b.y>=H-2){if(b.bounces>0){b.vy*=-1;b.y=b.y<=2?3:H-3;b.ang=Math.atan2(b.vy,b.vx);b.bounces--;}else return false;}
if(b.owner==='e'&&Math.hypot(b.x-P.x,b.y-P.y)<P.sz*1.6+16){if(P.ef!=='shield'){P.hp=Math.max(0,P.hp-13);P.sz=Math.max(MIN_SZ,P.sz-4);shake2(5);sndHit();setC('hit',55);}spawnFlash(b.x,b.y,'#0d0');if(ts-lastTaunt>2200&&Math.random()<.4){addTaunt(TH[Math.floor(Math.random()*TH.length)]);lastTaunt=ts;setT('smug',70);}return false;}if(b.owner==='p'&&Math.hypot(b.x-E.x,b.y-E.y)<E.sz*1.6+16){E.hp=Math.max(0,E.hp-12);E.sz=Math.max(MIN_SZ,E.sz-4);setT(E.hp<MAX_HP*.3?'panic':'pissed',80);shake2(3);sndHit();spawnFlash(b.x,b.y,'#f00');return false;}return b.life>0;});
flashes=flashes.filter(function(f){f.x+=f.vx;f.y+=f.vy;f.life--;return f.life>0;});taunts=taunts.filter(function(t){t.life--;return t.life>0;});if(shake.life>0)shake.life--;document.getElementById('php').textContent=Math.max(0,P.hp);document.getElementById('ehp').textContent=Math.max(0,E.hp);if(P.hp<=0||E.hp<=0){over=true;win=E.hp<=0?'crowd':'opponent';shake.life=0;if(win==='crowd'){pScore++;sndWin();setT('panic',9999);}else{eScore++;sndLose();setT('smug',9999);setC('hit',9999);}document.getElementById('scoreboard').textContent=pScore+' \u2014 '+eScore;setTimeout(function(){round++;init();},3000);}}

// blaster bolt
function drawBolt(b){var isP=b.owner==='p';var coreCol=isP?'#ff4444':'#44ff66';var glowCol=isP?'rgba(255,50,50,':'rgba(50,255,80,';var nx=Math.cos(b.ang),ny=Math.sin(b.ang),len=18,w=2.5;cx.save();cx.lineCap='round';cx.strokeStyle=glowCol+'0.25)';cx.lineWidth=w*6;cx.beginPath();cx.moveTo(b.x-nx*len*.5,b.y-ny*len*.5);cx.lineTo(b.x+nx*len*.5,b.y+ny*len*.5);cx.stroke();cx.strokeStyle=glowCol+'0.5)';cx.lineWidth=w*3;cx.beginPath();cx.moveTo(b.x-nx*len*.4,b.y-ny*len*.4);cx.lineTo(b.x+nx*len*.5,b.y+ny*len*.5);cx.stroke();cx.strokeStyle=coreCol;cx.lineWidth=w*1.5;cx.beginPath();cx.moveTo(b.x-nx*len*.3,b.y-ny*len*.3);cx.lineTo(b.x+nx*len*.45,b.y+ny*len*.45);cx.stroke();cx.strokeStyle='rgba(255,255,255,0.9)';cx.lineWidth=w*.7;cx.beginPath();cx.moveTo(b.x-nx*len*.15,b.y-ny*len*.15);cx.lineTo(b.x+nx*len*.35,b.y+ny*len*.35);cx.stroke();cx.fillStyle='#fff';cx.beginPath();cx.arc(b.x+nx*len*.4,b.y+ny*len*.4,w*.8,0,Math.PI*2);cx.fill();cx.restore();}

// draw starfield to offscreen canvas then composite blurred
function drawStars(ts){
  // star direction follows player offset from center
  var pdx=(P.x-MX)/MX, pdy=(P.y-MY)/MY; // -1 to 1
  var baseAng=Math.PI/2; // default: top to bottom
  var steerAng=baseAng + pdx*.4 - pdy*.25;

  sx.clearRect(0,0,W,H);
  sx.lineCap='round';
  for(var i=0;i<stars.length;i++){
    var st=stars[i];
    // smooth angle towards target
    st.ang+=(steerAng-st.ang)*.02;
    var ca=Math.cos(st.ang),sa2=Math.sin(st.ang);
    st.x+=ca*st.sp;st.y+=sa2*st.sp;st.tw+=.015;
    // wrap around
    if(st.y>H+30)st.y=-30;if(st.y<-30)st.y=H+30;
    if(st.x>W+30)st.x=-30;if(st.x<-30)st.x=W+30;
    var twinkle=st.br*(.6+Math.sin(st.tw)*.4);
    var gr=sx.createLinearGradient(st.x-ca*st.streak,st.y-sa2*st.streak,st.x,st.y);
    gr.addColorStop(0,'rgba(180,200,255,0)');
    gr.addColorStop(.4,'rgba(180,200,255,'+twinkle*.3+')');
    gr.addColorStop(1,'rgba(220,235,255,'+twinkle+')');
    sx.strokeStyle=gr;sx.lineWidth=st.sz;
    sx.beginPath();sx.moveTo(st.x-ca*st.streak,st.y-sa2*st.streak);sx.lineTo(st.x,st.y);sx.stroke();
  }
}

function draw(ts){
  cx.setTransform(1,0,0,1,0,0);cx.globalAlpha=1;

  // space background
  cx.fillStyle='#060a10';cx.fillRect(0,0,W,H);
  // nebula
  var ng=cx.createRadialGradient(W*.3,H*.4,0,W*.3,H*.4,W*.5);ng.addColorStop(0,'rgba(30,10,60,.12)');ng.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=ng;cx.fillRect(0,0,W,H);
  var ng2=cx.createRadialGradient(W*.75,H*.6,0,W*.75,H*.6,W*.4);ng2.addColorStop(0,'rgba(10,30,60,.1)');ng2.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=ng2;cx.fillRect(0,0,W,H);

  // blurred starfield
  drawStars(ts);
  cx.save();
  cx.filter='blur(3px)';
  cx.globalAlpha=.7;
  cx.drawImage(scv,0,0);
  cx.filter='none';
  cx.globalAlpha=1;
  cx.restore();

  // shake
  var ox=0,oy=0;if(shake.life>0&&!over){var sa=shake.amt*(shake.life/8)*.4;ox=(Math.random()-.5)*sa*2;oy=(Math.random()-.5)*sa*2;}cx.translate(ox,oy);

  // subtle edge vignette
  var vg=cx.createRadialGradient(MX,MY,Math.min(W,H)*.3,MX,MY,Math.max(W,H)*.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.35)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);

  // powerups
  pups.forEach(function(pu){var pulse=.88+Math.sin(ts*.005)*.12;cx.beginPath();cx.arc(pu.x,pu.y,10*pulse,0,Math.PI*2);cx.fillStyle=pu.t.col+'33';cx.fill();cx.strokeStyle=pu.t.col;cx.lineWidth=1.5;cx.stroke();cx.fillStyle=pu.t.col;cx.font='11px monospace';cx.textAlign='center';cx.fillText(pu.t.glyph,pu.x,pu.y+4);});

  bullets.forEach(drawBolt);
  flashes.forEach(function(f){var fa=f.life/f.max;cx.fillStyle=f.col;cx.globalAlpha=fa;cx.beginPath();cx.arc(f.x,f.y,3*fa,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;

  // HP rings
  [P,E].forEach(function(ent,i){var rcol=i===0?'#4fc3f7':'#ef5350',ratio=ent.hp/MAX_HP;cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+6,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);cx.strokeStyle=ratio>.35?rcol:'#ffb74d';cx.lineWidth=2.5;cx.stroke();if(ent.ef==='shield'){cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+12,0,Math.PI*2);cx.strokeStyle='rgba(186,104,200,.65)';cx.lineWidth=2;cx.stroke();}if(ent.ef==='auto'){cx.beginPath();cx.arc(ent.x,ent.y,ent.sz*2.2+12,0,Math.PI*2);cx.strokeStyle='rgba(233,30,99,.55)';cx.lineWidth=2;cx.stroke();}var gmap={rapid:'\u26A1',auto:'\u221E',speed:'\u00BB',shield:'\u25C8'},cmap={rapid:'#f57c00',auto:'#e91e63',speed:'#388e3c',shield:'#7b1fa2'};if(ent.ef&&gmap[ent.ef]){cx.fillStyle=cmap[ent.ef];cx.font='bold 12px monospace';cx.textAlign='center';cx.fillText(gmap[ent.ef],ent.x,ent.y-ent.sz*2.2-14);}});

  drawCanadian(P.x,P.y,P.sz,cE);drawTrump(E.x,E.y,E.sz,tE);

  taunts.forEach(function(t){var alpha=Math.min(1,t.life/20),yOff=-E.sz*3-20-(1-t.life/130)*10;cx.globalAlpha=alpha;cx.font='bold 10px monospace';cx.textAlign='center';cx.textBaseline='middle';var tw2=cx.measureText(t.txt).width+18;cx.fillStyle='#fffde7';cx.beginPath();cx.arc(E.x-tw2/2+9,E.y+yOff,9,Math.PI*.5,Math.PI*1.5);cx.arc(E.x+tw2/2-9,E.y+yOff,9,Math.PI*1.5,Math.PI*.5);cx.closePath();cx.fill();cx.strokeStyle='#f9a825';cx.lineWidth=1;cx.stroke();cx.fillStyle='#333';cx.fillText(t.txt,E.x,E.y+yOff);cx.globalAlpha=1;cx.textBaseline='alphabetic';});

  if(drag){cx.strokeStyle='rgba(79,195,247,.3)';cx.lineWidth=1;cx.setLineDash([4,4]);cx.beginPath();cx.arc(P.x,P.y,P.sz*2.2+12,0,Math.PI*2);cx.stroke();cx.setLineDash([]);}
  if(!focused){cx.fillStyle='rgba(6,10,20,.6)';cx.fillRect(0,H-26,W,26);cx.fillStyle='rgba(79,195,247,.5)';cx.font='11px monospace';cx.textAlign='center';cx.fillText('click here to enable keyboard controls',MX,H-9);}
  if(over){cx.fillStyle='rgba(4,8,16,.75)';cx.fillRect(0,0,W,H);cx.fillStyle=win==='crowd'?'#4fc3f7':'#ef5350';cx.font='bold 22px monospace';cx.textAlign='center';cx.fillText(win==='crowd'?'CROWD WINS!':'OPPONENT WINS!',MX,MY-16);cx.fillStyle='rgba(255,255,255,.5)';cx.font='12px monospace';cx.fillText('score  '+pScore+' \u2014 '+eScore,MX,MY+6);cx.fillStyle='rgba(255,255,255,.25)';cx.font='11px monospace';cx.fillText('next round starting\u2026',MX,MY+28);}
  cx.setTransform(1,0,0,1,0,0);
}

function loop(ts){try{update(ts);draw(ts);}catch(err){console.error('loop error:',err);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
